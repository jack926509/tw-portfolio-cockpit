<!-- 計算引擎（dev）：以 ES module 載入 engine.mjs 並掛到 window.Engine。
     module 於 DOMContentLoaded 前執行，Babel 於 DOMContentLoaded 才編譯下方區塊，
     故編譯後執行時 window.Engine 必已就緒。正式版由 build.mjs 內聯為全域 Engine。
     註：純 file:// 開啟時 Chrome 會擋 module，請用 npx serve 或開 dist/index.html。 -->
<script type="module">import * as E from "./engine.mjs"; window.Engine = E;</script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, useDeferredValue } = React;

/* 引擎 Web Worker：把重模擬（蒙地卡羅／拔靴）移出主執行緒，避免拖曳卡頓。
   正式版 build 會注入 window.__ENGINE_SRC__（引擎原始碼字串）；開發版無此字串時
   回傳 null，呼叫端自動退回主執行緒同步計算（功能不消失）。 */
function makeEngineWorker() {
  try {
    if (typeof Worker === "undefined" || !window.__ENGINE_SRC__) return null;
    const glue = "var window=self;" + window.__ENGINE_SRC__ +
      ";self.onmessage=function(e){var d=e.data;try{var out=self.Engine[d.fn](d.args);self.postMessage({id:d.id,ok:true,out:out});}catch(err){self.postMessage({id:d.id,ok:false,err:String(err)});}};";
    const url = URL.createObjectURL(new Blob([glue], { type: "text/javascript" }));
    return new Worker(url);
  } catch (e) { return null; }
}

/* 在 Worker 執行引擎函式；任何失敗（無 Worker／逾時／例外）皆退回 sync() 同步計算。 */
function runEngine(worker, fn, args, sync) {
  if (!worker) return Promise.resolve(sync());
  return new Promise((resolve) => {
    const id = Math.random().toString(36).slice(2);
    let done = false;
    const finish = (v) => { if (done) return; done = true; clearTimeout(to); worker.removeEventListener("message", onMsg); resolve(v); };
    const onMsg = (e) => { if (e.data && e.data.id === id) finish(e.data.ok ? e.data.out : sync()); };
    const to = setTimeout(() => finish(sync()), 6000);
    worker.addEventListener("message", onMsg);
    try { worker.postMessage({ id, fn, args }); } catch (err) { finish(sync()); }
  });
}
const { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Line, ComposedChart } = Recharts;

/* ---------- 主題 ---------- */
const C = {

const PALETTE = ["#1FA088", "#3B6FE2", "#E39A2B", "#E23B4E", "#8A4FE2", "#2BB0E3", "#E2693B", "#5A9E2B"];

const DEFAULTS = [
  { id: "009816", name: "凱基台灣TOP50", ticker: "009816", price: 15.3, alloc: 50, fee: 0.10, divYield: 0, tsmcW: 43.5, distributes: false, sigma: 18, color: "#1FA088" },

  { id: "00981A", name: "主動統一台股增長", ticker: "00981A", price: 30.8, alloc: 30, fee: 1.0,  divYield: 3.0, tsmcW: 28,   distributes: true,  sigma: 22, color: "#E39A2B" },
  { id: "2330",   name: "台積電",          ticker: "2330",   price: 2385, alloc: 20, fee: 0,    divYield: 0.9, tsmcW: 100,  distributes: true,  sigma: 30, color: "#E23B4E" },
];

const fmtWan = (v) => (v / 10000).toFixed(v >= 1e6 ? 0 : 1) + "萬";
const fmtNT = (v) => "NT$" + Math.round(v).toLocaleString();

/* ---------- 計算引擎：所有數學取自 engine.mjs ----------
   dev 由上方 <script type="module"> 注入 window.Engine；正式版由 build.mjs 內聯為全域 Engine。
   引擎含 num / quantile / makeRng / gaussianPair / simulate / monteCarlo，
   皆有 test/engine.test.mjs 單元測試把關（σ=0 一致性、連續複利、GBM 對數常態等）。 */
const { num, simulate, monteCarlo, bootstrapSimulate, historicalBacktest, toReal } = window.Engine;

/* ---------- UI 小元件 ---------- */
const Field = ({ label, children }) => (

const STORE_KEY = "tw_cockpit_v1";

/* 單一標的的欄位模板：載入舊資料時用來補齊新增欄位、清理型別 */
const INSTRUMENT_DEFAULT = {
  id: "", name: "新標的", ticker: "", price: 100, alloc: 0, fee: 0.3,
  divYield: 2, tsmcW: 0, distributes: true, sigma: 20, color: PALETTE[0],
};
const DEFAULT_STATE = {
  instruments: DEFAULTS, mode: "monthly", budget: 15000, gross: 7, years: 20,
  sweepId: "009816", sigma: 18, paths: 1500, advanced: false,
  model: "bootstrap", backtest: false,
  dist: "normal", nu: 5, rho: 0.7, cape: 0,
  taxOn: false, divTaxRate: 28, realView: false, infl: 2,
};

/* 情境預設：一鍵套用報酬假設與參數化分布／相關設定。
   保守＝低報酬高相關＋厚尾；中性＝歷史中庸；樂觀＝高報酬低相關。 */
const PRESETS = {
  保守: { gross: 4, rho: 0.85, dist: "t", nu: 4 },
  中性: { gross: 6, rho: 0.70, dist: "normal", nu: 5 },
  樂觀: { gross: 9, rho: 0.55, dist: "normal", nu: 5 },
};

/* 把任意（可能是舊版／殘缺）的 parsed 物件清成合法 state，缺漏一律回退預設。
   避免舊 localStorage 缺欄位造成 undefined → NaN 汙染整個試算。 */
function sanitizeState(d) {
  if (!d || typeof d !== "object") return { ...DEFAULT_STATE };
  const arr = Array.isArray(d.instruments) ? d.instruments : [];
  const instruments = arr
    .filter((i) => i && (i.id != null))
    .map((i, idx) => ({
      ...INSTRUMENT_DEFAULT,
      ...i,
      id: String(i.id),
      name: i.name != null ? String(i.name) : INSTRUMENT_DEFAULT.name,
      ticker: i.ticker != null ? String(i.ticker) : "",
      // 缺欄位 → 回退模板預設；存在但非數字 → num() 夾成 0，皆不產生 NaN
      price: num(i.price ?? INSTRUMENT_DEFAULT.price),
      alloc: num(i.alloc ?? INSTRUMENT_DEFAULT.alloc),
      fee: num(i.fee ?? INSTRUMENT_DEFAULT.fee),
      divYield: num(i.divYield ?? INSTRUMENT_DEFAULT.divYield),
      tsmcW: num(i.tsmcW ?? INSTRUMENT_DEFAULT.tsmcW),
      sigma: num(i.sigma ?? INSTRUMENT_DEFAULT.sigma),
      distributes: i.distributes != null ? !!i.distributes : INSTRUMENT_DEFAULT.distributes,
      color: i.color || PALETTE[idx % PALETTE.length],
    }));
  const safeInstruments = instruments.length ? instruments : DEFAULTS;
  const mode = d.mode === "lump" ? "lump" : "monthly";
  const sweepId = safeInstruments.some((i) => i.id === d.sweepId) ? d.sweepId : safeInstruments[0].id;
  return {
    instruments: safeInstruments,
    mode,
    budget: num(d.budget),
    gross: num(d.gross),
    years: Math.max(1, Math.round(num(d.years, 1)) || DEFAULT_STATE.years),
    sweepId,
    sigma: num(d.sigma),
    paths: Math.min(20000, Math.max(100, Math.round(num(d.paths, 100)) || DEFAULT_STATE.paths)),
    advanced: !!d.advanced,
    model: d.model === "parametric" ? "parametric" : "bootstrap",
    backtest: !!d.backtest,
    dist: d.dist === "t" ? "t" : "normal",
    nu: Math.min(30, Math.max(3, Math.round(num(d.nu, 3)) || DEFAULT_STATE.nu)),
    rho: Math.min(1, Math.max(0, num(d.rho))),
    cape: num(d.cape),
    taxOn: !!d.taxOn,
    divTaxRate: num(d.divTaxRate),
    realView: !!d.realView,
    infl: num(d.infl),
  };
}

function App() {
  const [instruments, setInstruments] = useState(DEFAULTS);
  const [mode, setMode] = useState("monthly");
  const [budget, setBudget] = useState(15000);
  const [gross, setGross] = useState(7);
  const [years, setYears] = useState(20);
  const [sweepId, setSweepId] = useState("009816");
  const [sigma, setSigma] = useState(18);
  const [paths, setPaths] = useState(1500);
  const [advanced, setAdvanced] = useState(false);
  const [model, setModel] = useState("bootstrap");   // 'bootstrap'（歷史拔靴，預設）| 'parametric'
  const [backtest, setBacktest] = useState(false);   // 回測校驗頁籤是否展開
  const [dist, setDist] = useState("normal");        // 參數化分布：'normal' | 't'（厚尾）
  const [nu, setNu] = useState(5);                   // Student-t 自由度（愈小尾愈胖）
  const [rho, setRho] = useState(0.7);               // 標的間平均相關係數（單因子等相關）
  const [cape, setCape] = useState(0);               // 台股 CAPE（席勒本益比），0＝不參考
  const [taxOn, setTaxOn] = useState(false);         // 是否計入股利稅負（二代健保+股利稅）
  const [divTaxRate, setDivTaxRate] = useState(28);  // 股利所得稅有效稅率%
  const [realView, setRealView] = useState(false);   // 以實質購買力（平減通膨）顯示
  const [infl, setInfl] = useState(2);               // 年通膨率%
  const [loaded, setLoaded] = useState(false);
  const [priceStatus, setPriceStatus] = useState(null); // {state:'loading'|'ok'|'err', msg, date}

  const applyState = (s) => {
    setInstruments(s.instruments); setMode(s.mode); setBudget(s.budget);
    setGross(s.gross); setYears(s.years); setSweepId(s.sweepId);
    setSigma(s.sigma); setPaths(s.paths); setAdvanced(s.advanced);
    setModel(s.model); setBacktest(s.backtest);
    setDist(s.dist); setNu(s.nu); setRho(s.rho); setCape(s.cape);
    setTaxOn(s.taxOn); setDivTaxRate(s.divTaxRate); setRealView(s.realView); setInfl(s.infl);
  };

  // 套用情境預設：設定毛報酬與參數化分布／相關，並切到參數化模式方便對照。
  const applyPreset = (p) => {
    const v = PRESETS[p]; if (!v) return;
    setGross(v.gross); setRho(v.rho); setDist(v.dist); setNu(v.nu); setModel("parametric");
  };

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (raw) applyState(sanitizeState(JSON.parse(raw)));
    } catch (e) { /* 用預設 */ }
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    try { localStorage.setItem(STORE_KEY, JSON.stringify({ instruments, mode, budget, gross, years, sweepId, sigma, paths, advanced, model, backtest, dist, nu, rho, cape, taxOn, divTaxRate, realView, infl })); }
    catch (e) { /* 忽略 */ }
  }, [instruments, mode, budget, gross, years, sweepId, sigma, paths, advanced, model, backtest, dist, nu, rho, cape, taxOn, divTaxRate, realView, infl, loaded]);

  const tax = taxOn ? { supplement: true, divTaxRate } : null;
  const R = useMemo(() => simulate({ instruments, mode, budget, gross, years, sweepId, tax }),
    [instruments, mode, budget, gross, years, sweepId, taxOn, divTaxRate]);

  // 引擎 Worker：建一次、卸載時收掉。重模擬走 Worker，失敗自動退回主執行緒。
  const workerRef = useRef(null);
  useEffect(() => { workerRef.current = makeEngineWorker(); return () => { if (workerRef.current) workerRef.current.terminate(); }; }, []);

  // 重模擬輸入用 useDeferredValue 延後合併：拖曳滑桿時 UI 先即時回應，模擬在低優先級重算。
  const dInstruments = useDeferredValue(instruments);
  const dGross = useDeferredValue(gross);
  const dYears = useDeferredValue(years);
  const dSigma = useDeferredValue(sigma);
  const dPaths = useDeferredValue(paths);
  const dRho = useDeferredValue(rho);

  // 參數化（蒙地卡羅）只在進階＋選參數化模式時計算；經 Worker 非同步取得，sync 為退回路徑。
  const [MC, setMC] = useState(null);
  useEffect(() => {
    if (!(advanced && model === "parametric")) { setMC(null); return; }
    const args = { instruments: dInstruments, mode, budget, gross: dGross, years: dYears, sigma: dSigma, paths: dPaths, dist, nu, rho: dRho };
    let cancelled = false;
    runEngine(workerRef.current, "monteCarlo", args, () => monteCarlo(args)).then((r) => { if (!cancelled) setMC(r); });
    return () => { cancelled = true; };
  }, [advanced, model, dInstruments, mode, budget, dGross, dYears, dSigma, dPaths, dist, nu, dRho]);

  // 歷史平穩拔靴（預設模型）：借歷史波動結構，報酬以 gross 假設 recenter。
  const [BS, setBS] = useState(null);
  useEffect(() => {
    if (!(advanced && model === "bootstrap")) { setBS(null); return; }
    const args = { instruments: dInstruments, mode, budget, gross: dGross, years: dYears, paths: dPaths, avgBlock: 6 };
    let cancelled = false;
    runEngine(workerRef.current, "bootstrapSimulate", args, () => bootstrapSimulate(args)).then((r) => { if (!cancelled) setBS(r); });
    return () => { cancelled = true; };
  }, [advanced, model, dInstruments, mode, budget, dGross, dYears, dPaths]);

  // 統一給圖表用的模擬結果（兩模型 series 同形）。
  const SIM = model === "bootstrap" ? BS : MC;

  // 歷史回測校驗：用實際歷史月報酬跑滾動視窗（不抽樣、不 recenter）。
  const BT = useMemo(() => (advanced && backtest
    ? historicalBacktest({ mode, budget, years })
    : null),
    [advanced, backtest, mode, budget, years]);

  // 圖表資料：把回測「最近一段實績」疊成 hist 線（與模擬機率帶同 year 對齊）。
  const chartData = useMemo(() => {
    if (!SIM) return null;
    let s = BT
      ? SIM.series.map((d, idx) => ({ ...d, hist: BT.last.series[idx] ? BT.last.series[idx].total : null }))
      : SIM.series;
    return realView ? toReal(s, { infl }) : s;
  }, [SIM, BT, realView, infl]);

  // 實質購買力平減因子（年期末）；非實質模式為 1。供統計卡的名目金額換算。
  const realF = realView ? Math.pow(1 + num(infl) / 100, years) : 1;

  const allocSum = instruments.reduce((s, i) => s + num(i.alloc), 0);

  // 抓最新收盤價：上市走證交所 OpenAPI、上櫃走櫃買中心 TPEx OpenAPI，皆免金鑰、
  // 單次回傳全市場（含 ETF）。兩者都未送 CORS 標頭，純前端直連會被瀏覽器擋下，
  // 故每個來源都依序嘗試「直連 → corsproxy.io → allorigins」，任一成功即止。
  const fetchJsonWithProxy = async (target) => {
    const attempts = [
      target,
      "https://corsproxy.io/?url=" + encodeURIComponent(target),
      "https://api.allorigins.win/raw?url=" + encodeURIComponent(target),
    ];
    for (const url of attempts) {
      try {
        const res = await fetch(url);
        if (!res.ok) continue;
        const data = await res.json();
        if (Array.isArray(data) && data.length) return data;
      } catch (e) { /* 換下一個來源 */ }
    }
    return null;
  };
  const fetchPrices = async () => {
    setPriceStatus({ state: "loading" });
    const parsePrice = (v) => num(String(v == null ? "" : v).replace(/,/g, "")); // 去除千分位逗號
    const map = {};
    // 上市與上櫃並行抓取，各自處理代理備援
    const [tw, tp] = await Promise.all([
      fetchJsonWithProxy("https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_AVG_ALL"),
      fetchJsonWithProxy("https://www.tpex.org.tw/openapi/v1/tpex_mainboard_daily_close_quotes"),
    ]);
    if (tw) tw.forEach((r) => { const c = r.Code; if (c) map[String(c).trim()] = parsePrice(r.ClosingPrice); });
    // TPEx 欄位名以 SecuritiesCompanyCode / Close 為主，保留備援鍵名以防欄位調整
    if (tp) tp.forEach((r) => {
      const c = r.SecuritiesCompanyCode || r.Code || r.CompanyCode;
      if (c) map[String(c).trim()] = parsePrice(r.Close != null ? r.Close : r.ClosingPrice);
    });
    if (!tw && !tp) {
      setPriceStatus({ state: "err", msg: "抓取失敗（上市/上櫃來源與 CORS 代理皆無法連線），可改手動填入。" });
      return;
    }
    let hit = 0, miss = [];
    setInstruments((arr) => arr.map((i) => {
      const key = String(i.ticker || "").trim();
      const p = map[key];
      if (key && Number.isFinite(p) && p > 0) { hit++; return { ...i, price: p }; }
      if (key) miss.push(key);
      return i;
    }));
    const srcLabel = tw && tp ? "上市+上櫃" : (tw ? "僅上市（上櫃來源失敗）" : "僅上櫃（上市來源失敗）");
    setPriceStatus({
      state: "ok",
      msg: "已更新 " + hit + " 檔（" + srcLabel + "）" + (miss.length ? "，查無：" + miss.join("、") : ""),
    });
  };

  // 設定匯出/匯入（JSON），方便備份與分享；匯入一律經 sanitizeState 清理。
  const exportConfig = () => {
    const blob = new Blob([JSON.stringify({ instruments, mode, budget, gross, years, sweepId, sigma, paths, advanced, model, backtest, dist, nu, rho, cape, taxOn, divTaxRate, realView, infl }, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "tw-cockpit-config.json"; a.click();
    URL.revokeObjectURL(url);
  };
  const importConfig = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try { applyState(sanitizeState(JSON.parse(reader.result))); }
      catch (err) { alert("匯入失敗：檔案不是有效的設定 JSON。"); }
    };
    reader.readAsText(file);
    e.target.value = ""; // 允許重複匯入同一檔
  };

  const update = (id, k, v) => setInstruments((arr) => arr.map((i) => (i.id === id ? { ...i, [k]: v } : i)));
  const addRow = () => {
    const id = "X" + Math.random().toString(36).slice(2, 6);
    setInstruments((arr) => [...arr, {
      id, name: "新標的", ticker: "", price: 100, alloc: 0, fee: 0.3,
      divYield: 2, tsmcW: 0, distributes: true, color: PALETTE[arr.length % PALETTE.length],
    }]);
  };
  const removeRow = (id) => setInstruments((arr) => {
    const next = arr.filter((i) => i.id !== id);
    if (id === sweepId && next.length) setSweepId(next[0].id);
    return next;
  });
  const reset = () => {
    if (!window.confirm("確定要清除目前所有設定並還原預設值嗎？此動作無法復原。")) return;
    applyState({ ...DEFAULT_STATE });
  };

  const zone = R.lookTsmc >= 55 ? { label: "過度集中", color: C.red }
    : R.lookTsmc >= 45 ? { label: "偏高", color: C.warn }
      : { label: "尚可", color: C.jade };
  const needle = Math.min(100, Math.max(0, R.lookTsmc));
  const finalDiv = R.series.length ? R.series[R.series.length - 1].divSwept : 0;
  const multiple = R.invested ? R.finalTotal / R.invested : 0;

  return (
    <div style={{ background: C.canvas, minHeight: "100%", fontFamily: "var(--sans)", color: C.ink, padding: "20px 16px" }}>
      <div style={{ maxWidth: 940, margin: "0 auto" }}>
        <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", flexWrap: "wrap", gap: 8, marginBottom: 16 }}>
          <div>
            <div style={{ fontSize: 22, fontWeight: 700, letterSpacing: "-.01em" }}>台股配置控制台</div>
            <div style={{ fontSize: 12.5, color: C.muted, marginTop: 2 }}>定期定額試算 · 穿透集中度 · 股利全掃複利目標</div>
          </div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            <button className="btn" onClick={exportConfig} aria-label="匯出設定為 JSON 檔">匯出</button>
            <label className="btn" style={{ margin: 0 }}>
              匯入
              <input type="file" accept="application/json,.json" onChange={importConfig} aria-label="匯入設定 JSON 檔" style={{ display: "none" }} />
            </label>
            <button className="btn" onClick={reset} aria-label="重設為預設值"><RotateCcw size={14} /> 重設預設</button>
          </div>
        </div>

        <div className="grid2" style={{ display: "grid", gridTemplateColumns: "1.1fr 1fr", gap: 12, marginBottom: 12 }}>
          <div className="card" style={{ background: C.inkPanel, padding: 18, color: "#fff" }}>
            <div style={{ fontSize: 11.5, color: "#9aa3b2", letterSpacing: ".06em", textTransform: "uppercase" }}>穿透台積電集中度</div>
            <div style={{ display: "flex", alignItems: "flex-end", gap: 10, margin: "6px 0 12px" }}>
              <div className="num" style={{ fontSize: 46, fontWeight: 700, lineHeight: 1, color: zone.color }}>{R.lookTsmc.toFixed(0)}%</div>
              <div style={{ paddingBottom: 6, fontSize: 13, color: zone.color, fontWeight: 600 }}>{zone.label}</div>
            </div>
            <div style={{ position: "relative", height: 12, borderRadius: 6, overflow: "hidden", display: "flex" }}>
              <div style={{ width: "45%", background: "rgba(31,160,136,.55)" }} />
              <div style={{ width: "10%", background: "rgba(224,115,43,.6)" }} />
              <div style={{ width: "45%", background: "rgba(226,59,78,.6)" }} />
              <div style={{ position: "absolute", top: -3, left: "calc(" + needle + "% - 1px)", width: 2, height: 18, background: "#fff", boxShadow: "0 0 6px rgba(0,0,0,.6)" }} />
            </div>
            <div className="num" style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: "#7c8597", marginTop: 5 }}>
              <span>0</span><span>45 尚可</span><span>55</span><span>100%</span>
            </div>
            <div style={{ fontSize: 11.5, color: "#9aa3b2", marginTop: 10, lineHeight: 1.5 }}>
              台積電是多數市值型 ETF 的最大持股，單獨加買 2330 會讓你的錢更集中在一家公司。
            </div>
          </div>

          <div className="card" style={{ padding: 18 }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
              <Stat label={mode === "monthly" ? years + "年累計投入" : "投入本金"} val={fmtWan(R.invested)} sub={fmtNT(R.invested)} />
              <Stat label={years + "年累積資產"} val={fmtWan(R.finalTotal)} sub={"成長 " + multiple.toFixed(2) + "×"} color={C.red} />
              <Stat label="複利增額" val={fmtWan(R.finalTotal - R.invested)} sub={"年化 " + gross + "% 假設"} />
              <Stat label="末年掃入股利" val={fmtNT(finalDiv)} sub="進口袋現金＝0" color={C.jade} />
            </div>
          </div>
        </div>

        <div className="card" style={{ padding: 16, marginBottom: 12 }}>
          <div className="grid2" style={{ display: "grid", gridTemplateColumns: "auto auto 1fr 1fr auto", gap: 16, alignItems: "center" }}>
            <Field label="投入方式">
              <div style={{ display: "flex", border: "1px solid " + C.border, borderRadius: 8, overflow: "hidden" }}>
                {[["monthly", "每月"], ["lump", "單筆"]].map(([k, l]) => (
                  <button key={k} onClick={() => setMode(k)}
                    style={{ padding: "7px 14px", fontSize: 13, border: "none", cursor: "pointer", background: mode === k ? C.ink : "#fff", color: mode === k ? "#fff" : C.muted }}>{l}</button>
                ))}
              </div>
            </Field>
            <Field label={mode === "monthly" ? "每月金額" : "單筆金額"}>
              <input className="num" aria-label={mode === "monthly" ? "每月金額" : "單筆金額"} style={{ ...numInput, width: 120 }} type="number" min="0" value={budget}
                onChange={(e) => setBudget(num(e.target.value))} />
            </Field>
            <Field label={"年化報酬假設 — " + gross + "%"}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <input type="range" min="0" max="15" step="0.5" value={gross} onChange={(e) => setGross(+e.target.value)} style={{ flex: 1, accentColor: C.red }} />
                <span className="hidemob" style={{ display: "flex", gap: 4 }}>
                  {[["保守", 5], ["基準", 7], ["樂觀", 9]].map(([l, v]) => (
                    <button key={v} onClick={() => setGross(v)} className="btn" style={{ padding: "3px 8px", fontSize: 11 }}>{l}</button>
                  ))}
                </span>
              </div>
            </Field>
            <Field label={"投資年期 — " + years + " 年"}>
              <input type="range" min="1" max="40" value={years} onChange={(e) => setYears(+e.target.value)} style={{ accentColor: C.red }} />
            </Field>
            <Field label="股利掃入目標">
              <select style={{ ...numInput, fontFamily: "var(--sans)" }} value={sweepId} onChange={(e) => setSweepId(e.target.value)}>
                {instruments.map((i) => <option key={i.id} value={i.id}>{i.name}</option>)}
              </select>
            </Field>
            <Field label="計入股利稅負">
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <button className="btn" onClick={() => setTaxOn((v) => !v)} aria-pressed={taxOn}
                  style={{ padding: "6px 12px", background: taxOn ? C.warn : "#fff", color: taxOn ? "#fff" : C.muted, borderColor: taxOn ? C.warn : C.border }}>
                  {taxOn ? "開（二代健保＋股利稅）" : "關"}
                </button>
                <label style={{ fontSize: 11, color: C.muted, display: "flex", gap: 4, alignItems: "center" }}>
                  股利稅率%
                  <input className="num" type="number" min="0" step="1" value={divTaxRate} onChange={(e) => setDivTaxRate(num(e.target.value))} aria-label="股利所得稅有效稅率" disabled={!taxOn} style={{ ...numInput, width: 52, opacity: taxOn ? 1 : 0.5 }} />
                </label>
              </div>
            </Field>
          </div>
          {taxOn && (
            <div style={{ fontSize: 11, color: C.muted, marginTop: 8, lineHeight: 1.6 }}>
              單筆股利 ≥ NT$20,000 課二代健保補充保費 2.11%，並按上述有效稅率課股利所得稅；稅後股利才掃入再投資。此設定僅影響上方直線試算的配息標的，機率模擬採總報酬假設不另計。
            </div>
          )}
        </div>

        <div className="card" style={{ padding: 16, marginBottom: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
            <div>
              <div style={{ fontSize: 14, fontWeight: 700 }}>機率模擬</div>
              <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>上方直線試算假設報酬固定；這裡加入波動與隨機性，看結果的機率分布。預設用台股歷史報酬做「平穩拔靴」（含厚尾與序列報酬風險），亦可切換參數化（GBM 對數常態）。</div>
            </div>
            <button className="btn" onClick={() => setAdvanced((v) => !v)} aria-pressed={advanced}
              style={{ background: advanced ? C.ink : "#fff", color: advanced ? "#fff" : C.muted }}>
              {advanced ? "進階模式：開" : "進階模式：關"}
            </button>
          </div>

          {advanced && SIM && (
            <div style={{ marginTop: 14 }}>
              {/* 模型切換 + 回測開關 */}
              <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap", alignItems: "center" }}>
                {[["bootstrap", "歷史拔靴（預設）"], ["parametric", "參數化"]].map(([k, lab]) => (
                  <button key={k} className="btn" onClick={() => setModel(k)} aria-pressed={model === k}
                    style={{ background: model === k ? C.blue : "#fff", color: model === k ? "#fff" : C.muted, borderColor: model === k ? C.blue : C.border }}>
                    {lab}
                  </button>
                ))}
                <label style={{ marginLeft: "auto", fontSize: 11, color: C.muted, display: "flex", gap: 4, alignItems: "center" }}>
                  通膨%
                  <input className="num" type="number" min="0" step="0.5" value={infl} onChange={(e) => setInfl(num(e.target.value))} aria-label="年通膨率" disabled={!realView} style={{ ...numInput, width: 52, opacity: realView ? 1 : 0.5 }} />
                </label>
                <button className="btn" onClick={() => setRealView((v) => !v)} aria-pressed={realView}
                  style={{ background: realView ? C.jade : "#fff", color: realView ? "#fff" : C.muted, borderColor: realView ? C.jade : C.border }}>
                  {realView ? "實質購買力：開" : "實質購買力：關"}
                </button>
                <button className="btn" onClick={() => setBacktest((v) => !v)} aria-pressed={backtest}
                  style={{ background: backtest ? C.ink : "#fff", color: backtest ? "#fff" : C.muted }}>
                  {backtest ? "回測校驗：開" : "回測校驗：關"}
                </button>
              </div>

              {/* 控制列：參數化顯示相關係數 ρ（σ 已改為各標的欄位） */}
              <div className="grid2" style={{ display: "grid", gridTemplateColumns: model === "parametric" ? "1fr 1fr auto" : "1fr auto", gap: 16, alignItems: "center", marginBottom: 12 }}>
                {model === "parametric" && (
                  <Field label={"標的間平均相關係數 ρ — " + rho.toFixed(2)}>
                    <input type="range" min="0" max="1" step="0.05" value={rho} onChange={(e) => setRho(num(e.target.value))} aria-label="標的間平均相關係數" style={{ accentColor: C.blue }} />
                  </Field>
                )}
                <Field label="模擬路徑數">
                  <select style={{ ...numInput, fontFamily: "var(--sans)" }} value={paths} onChange={(e) => setPaths(num(e.target.value, 100))} aria-label="模擬路徑數">
                    {[500, 1500, 5000].map((n) => <option key={n} value={n}>{n.toLocaleString()} 條</option>)}
                  </select>
                </Field>
                {model === "parametric" ? (
                  <div style={{ fontSize: 11, color: C.muted, lineHeight: 1.5 }}>
                    隱含幾何報酬<br /><span className="num" style={{ fontSize: 16, fontWeight: 700, color: C.ink }}>{MC.cagrImplied.toFixed(2)}%</span><br />
                    ＝算術 {gross}% − 波動拖累 σ²/2
                  </div>
                ) : (
                  <div style={{ fontSize: 11, color: C.muted, lineHeight: 1.5 }}>
                    台股歷史波動結構<br />報酬已 recenter 至 <span className="num" style={{ fontWeight: 700, color: C.ink }}>{gross}%</span> 假設<br />區塊均長 6 個月
                  </div>
                )}
              </div>

              {/* 參數化：情境預設、報酬分布、CAPE 估值參考 */}
              {model === "parametric" && (
                <div style={{ display: "flex", flexWrap: "wrap", gap: 14, alignItems: "center", marginBottom: 12, padding: "10px 12px", background: "#F4F7FA", borderRadius: 10 }}>
                  <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                    <span style={{ fontSize: 11, color: C.muted }}>情境預設</span>
                    {Object.keys(PRESETS).map((p) => (
                      <button key={p} className="btn" onClick={() => applyPreset(p)} style={{ padding: "4px 10px", fontSize: 12 }}>{p}</button>
                    ))}
                  </div>
                  <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                    <span style={{ fontSize: 11, color: C.muted }}>報酬分布</span>
                    {[["normal", "常態"], ["t", "厚尾 t"]].map(([k, lab]) => (
                      <button key={k} className="btn" onClick={() => setDist(k)} aria-pressed={dist === k}
                        style={{ padding: "4px 10px", fontSize: 12, background: dist === k ? C.blue : "#fff", color: dist === k ? "#fff" : C.muted, borderColor: dist === k ? C.blue : C.border }}>{lab}</button>
                    ))}
                    {dist === "t" && (
                      <label style={{ fontSize: 11, color: C.muted, display: "flex", gap: 4, alignItems: "center" }}>
                        自由度 ν
                        <select style={{ ...numInput, fontFamily: "var(--sans)", width: 56 }} value={nu} onChange={(e) => setNu(Math.max(3, num(e.target.value, 3)))} aria-label="Student-t 自由度">
                          {[3, 4, 5, 6, 8, 10].map((n) => <option key={n} value={n}>{n}</option>)}
                        </select>
                      </label>
                    )}
                  </div>
                  <label style={{ fontSize: 11, color: C.muted, display: "flex", gap: 4, alignItems: "center" }}>
                    台股 CAPE
                    <input className="num" type="number" min="0" step="0.5" value={cape} onChange={(e) => setCape(num(e.target.value))} aria-label="台股 CAPE 席勒本益比" style={{ ...numInput, width: 64 }} />
                  </label>
                  {cape > 0 && (() => {
                    const er = window.Engine.valuationAdjustedReturn({ cape });
                    const hot = er < gross;
                    return (
                      <span style={{ fontSize: 11, color: hot ? C.red : C.jade, lineHeight: 1.4 }}>
                        盈餘殖利率推估長期報酬約 <b className="num">{er.toFixed(1)}%</b>
                        {hot ? "，低於你的毛報酬假設 " + gross + "%，估值偏高、假設可能偏樂觀。" : "，不低於你的假設，估值相對合理。"}
                      </span>
                    );
                  })()}
                </div>
              )}

              {/* 統計卡：兩模型不同 */}
              {model === "parametric" ? (
                <div className="grid2" style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 14, marginBottom: 12 }}>
                  <Stat label="中位數資產 (P50)" val={fmtWan(MC.medianFinal / realF)} sub={"成長 " + MC.medianMultiple.toFixed(2) + "×"} color={C.red} />
                  <Stat label="樂觀 (P90)" val={fmtWan(MC.series[years].p90 / realF)} sub="前 10% 路徑" color={C.jade} />
                  <Stat label="保守 (P10)" val={fmtWan(MC.series[years].p10 / realF)} sub="後 10% 路徑" color={C.warn} />
                  <Stat label="保本機率" val={MC.aboveInvested.toFixed(0) + "%"} sub={"翻倍機率 " + MC.aboveDouble.toFixed(0) + "%"} color={C.blue} />
                </div>
              ) : (
                <React.Fragment>
                  <div className="grid2" style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 14, marginBottom: 10 }}>
                    <Stat label="中位數資產 (P50)" val={fmtWan(BS.medianFinal / realF)} sub={"成長 " + BS.medianMultiple.toFixed(2) + "×"} color={C.red} />
                    <Stat label="樂觀 (P90)" val={fmtWan(BS.series[years].p90 / realF)} sub="前 10% 路徑" color={C.jade} />
                    <Stat label="保守 (P10)" val={fmtWan(BS.series[years].p10 / realF)} sub="後 10% 路徑" color={C.warn} />
                    <Stat label="達標率" val={(BS.risk.successRate * 100).toFixed(0) + "%"} sub="期末 ≥ 投入本金" color={C.blue} />
                  </div>
                  <div className="grid2" style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 14, marginBottom: 12 }}>
                    <Stat label="最大回撤（中位）" val={(BS.risk.maxDrawdownP50 * 100).toFixed(0) + "%"} sub="一半路徑不超過此跌幅" color={C.warn} />
                    <Stat label="最大回撤（P90，較差）" val={(BS.risk.maxDrawdownP90 * 100).toFixed(0) + "%"} sub="一成路徑跌更深" color={C.red} />
                    <Stat label="最差 5% 期末 (CVaR)" val={fmtWan(BS.risk.cvar05 / realF)} sub="尾端風險" color={C.muted} />
                  </div>
                </React.Fragment>
              )}

              <ResponsiveContainer width="100%" height={240}>
                <ComposedChart data={chartData} margin={{ left: -8, right: 6, top: 4 }}>
                  <CartesianGrid stroke="#EEF1F5" vertical={false} />
                  <XAxis dataKey="year" tick={{ fontSize: 11, fill: C.muted }} tickLine={false} axisLine={{ stroke: C.border }} />
                  <YAxis tickFormatter={fmtWan} tick={{ fontSize: 10, fill: C.muted }} tickLine={false} axisLine={false} width={48} />
                  <Tooltip
                    formatter={(v, n) => {
                      if (n === "band") return [fmtWan(v[0]) + " ～ " + fmtWan(v[1]), "P10–P90 區間"];
                      if (n === "hist") return [fmtWan(v), "歷史實績"];
                      return [fmtWan(v), n === "p50" ? "中位數" : "投入本金"];
                    }}
                    labelFormatter={(y) => "第 " + y + " 年"}
                    contentStyle={{ fontSize: 12, borderRadius: 8, border: "1px solid " + C.border }} />
                  <Area dataKey="band" stroke="none" fill={C.blue} fillOpacity={0.14} />
                  <Line type="monotone" dataKey="p50" stroke={C.red} strokeWidth={2.2} dot={false} />
                  <Line type="monotone" dataKey="invested" stroke={C.muted} strokeWidth={1.4} strokeDasharray="4 4" dot={false} />
                  {BT && <Line type="monotone" dataKey="hist" stroke={C.jade} strokeWidth={2} dot={false} />}
                </ComposedChart>
              </ResponsiveContainer>

              {BT && (
                <div style={{ fontSize: 11, color: C.muted, marginTop: 8, lineHeight: 1.6, background: "#F4F7FA", borderRadius: 8, padding: "8px 10px" }}>
                  <b style={{ color: C.ink }}>回測校驗</b>（綠線）：台股歷史 {window.Engine.HIST_RETURNS.range}，過去 {BT.windows} 段 {years} 年滾動視窗，實際期末中位 {fmtWan(BT.p50)}（區間 {fmtWan(BT.p10)} ～ {fmtWan(BT.p90)}）。
                  最近一段實績 {fmtWan(BT.last.finalValue)}，{(BT.last.finalValue >= SIM.series[years].p10 && BT.last.finalValue <= SIM.series[years].p90) ? "落在" : "落在外側於"}模擬 P10–P90 機率帶。
                </div>
              )}

              <div style={{ fontSize: 11, color: C.muted, marginTop: 8, lineHeight: 1.6 }}>
                {model === "bootstrap"
                  ? "藍色帶＝歷史拔靴 " + BS.paths.toLocaleString() + " 條路徑的 P10–P90 範圍；借用台股歷史的波動、厚尾與序列相依，報酬已平移到你的毛報酬假設。紅線＝中位數，灰虛線＝投入本金。"
                  : "藍色帶＝" + MC.paths.toLocaleString() + " 條隨機路徑中 P10–P90 的範圍；紅線＝中位數，灰虛線＝投入本金。σ=0 時三條分位數會重合、回到上方直線試算。"}
                {realView ? "（已以年通膨 " + infl + "% 平減為今日購買力）" : ""}
              </div>
            </div>
          )}
        </div>

        <div className="card" style={{ padding: 16, marginBottom: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div style={{ fontSize: 14, fontWeight: 700 }}>標的與配置</div>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span className="num" style={{ fontSize: 12, color: Math.round(allocSum) === 100 ? C.jade : C.warn }}>
                配置合計 {allocSum.toFixed(0)}%{Math.round(allocSum) !== 100 ? "（將自動正規化）" : ""}
              </span>
              <button className="btn" onClick={fetchPrices} disabled={priceStatus && priceStatus.state === "loading"} aria-label="從證交所更新最新收盤價"><Coins size={14} /> {priceStatus && priceStatus.state === "loading" ? "更新中…" : "更新股價"}</button>
              <button className="btn" onClick={addRow} aria-label="新增一檔標的"><Plus size={14} /> 新增標的</button>
            </div>
          </div>
          {priceStatus && priceStatus.state !== "loading" && (
            <div style={{ fontSize: 11, marginBottom: 8, color: priceStatus.state === "err" ? C.red : C.jade }}>
              {priceStatus.msg} · 最近收盤價、非盤中即時
            </div>
          )}

          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 720 }}>
              <thead>
                <tr style={{ fontSize: 10.5, color: C.muted, textAlign: "left" }}>
                  {["", "名稱", "代號", "股價", "配置%", "內扣%", "現金殖利%", "台積權重%", "波動%", "配息", "股數", ""].map((h, j) => (
                    <th key={j} style={{ padding: "4px 6px", fontWeight: 500, letterSpacing: ".02em" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {R.buys.map((b) => (
                  <tr key={b.id} style={{ borderTop: "1px solid " + C.border }}>
                    <td style={{ padding: "6px" }}><span style={{ display: "inline-block", width: 10, height: 10, borderRadius: 3, background: b.color }} /></td>
                    <td style={{ padding: "6px" }}><input style={{ ...numInput, fontFamily: "var(--sans)", width: 120 }} value={b.name} onChange={(e) => update(b.id, "name", e.target.value)} /></td>
                    <td style={{ padding: "6px" }}><input style={{ ...numInput, width: 72 }} value={b.ticker} onChange={(e) => update(b.id, "ticker", e.target.value)} /></td>
                    <td style={{ padding: "6px" }}><input className="num" aria-label={b.name + " 股價"} style={{ ...numInput, width: 72 }} type="number" min="0" value={b.price} onChange={(e) => update(b.id, "price", num(e.target.value))} /></td>
                    <td style={{ padding: "6px" }}><input className="num" aria-label={b.name + " 配置%"} style={{ ...numInput, width: 58 }} type="number" min="0" value={b.alloc} onChange={(e) => update(b.id, "alloc", num(e.target.value))} /></td>
                    <td style={{ padding: "6px" }}><input className="num" aria-label={b.name + " 內扣%"} style={{ ...numInput, width: 56 }} type="number" min="0" step="0.01" value={b.fee} onChange={(e) => update(b.id, "fee", num(e.target.value))} /></td>
                    <td style={{ padding: "6px" }}><input className="num" aria-label={b.name + " 現金殖利%"} style={{ ...numInput, width: 56 }} type="number" min="0" step="0.1" value={b.divYield} onChange={(e) => update(b.id, "divYield", num(e.target.value))} /></td>
                    <td style={{ padding: "6px" }}><input className="num" aria-label={b.name + " 台積權重%"} style={{ ...numInput, width: 58 }} type="number" min="0" step="0.5" value={b.tsmcW} onChange={(e) => update(b.id, "tsmcW", num(e.target.value))} /></td>
                    <td style={{ padding: "6px" }}><input className="num" aria-label={b.name + " 年化波動%"} style={{ ...numInput, width: 56 }} type="number" min="0" step="1" value={b.sigma} onChange={(e) => update(b.id, "sigma", num(e.target.value))} /></td>
                    <td style={{ padding: "6px", textAlign: "center" }}>
                      <input type="checkbox" aria-label={b.name + " 是否配息"} checked={b.distributes} onChange={(e) => update(b.id, "distributes", e.target.checked)} style={{ accentColor: C.jade, width: 16, height: 16 }} />
                    </td>
                    <td className="num" style={{ padding: "6px", fontSize: 12.5 }}>
                      <div style={{ fontWeight: 600 }}>{b.shares.toLocaleString()} 股</div>
                      <div style={{ fontSize: 10.5, color: C.muted }}>{fmtNT(b.cost)}</div>
                    </td>
                    <td style={{ padding: "6px" }}>
                      <button onClick={() => removeRow(b.id)} title="刪除" aria-label={"刪除 " + b.name} style={{ border: "none", background: "none", cursor: "pointer", color: C.muted, padding: 4 }}><Trash2 size={15} /></button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{ fontSize: 11, color: C.muted, marginTop: 8, lineHeight: 1.6 }}>
            「台積權重%」是該標的內部持有多少台積電（2330 填 100、非電子股填 0），用來算最上方的穿透集中度。
            「配息」打勾的標的，其現金股利會在每年底自動掃進你選的複利目標（預設 009816）；目標本身不配息、全部滾入再投資。
            「波動%」是各標的年化波動度，供進階「參數化」模型逐標的模擬用（市值型 ETF 約 18、主動型約 22、個股約 30）；歷史拔靴模型不使用此欄。
          </div>
        </div>

        <div className="grid2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <div className="card" style={{ padding: 16 }}>
            <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 4 }}>累積資產 vs 投入本金</div>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 8 }}>缺口＝複利貢獻，後段才明顯拉開</div>
            <ResponsiveContainer width="100%" height={230}>
              <ComposedChart data={R.series} margin={{ left: -8, right: 6, top: 4 }}>
                <defs>
                  <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor={C.red} stopOpacity={0.25} />
                    <stop offset="100%" stopColor={C.red} stopOpacity={0.02} />
                  </linearGradient>
                </defs>
                <CartesianGrid stroke="#EEF1F5" vertical={false} />
                <XAxis dataKey="year" tick={{ fontSize: 11, fill: C.muted }} tickLine={false} axisLine={{ stroke: C.border }} />
                <YAxis tickFormatter={fmtWan} tick={{ fontSize: 10, fill: C.muted }} tickLine={false} axisLine={false} width={48} />
                <Tooltip formatter={(v, n) => [fmtWan(v), n === "total" ? "累積資產" : "投入本金"]} labelFormatter={(y) => "第 " + y + " 年"}
                  contentStyle={{ fontSize: 12, borderRadius: 8, border: "1px solid " + C.border }} />
                <Area type="monotone" dataKey="total" stroke={C.red} strokeWidth={2.4} fill="url(#g)" />
                <Line type="monotone" dataKey="invested" stroke={C.muted} strokeWidth={1.4} strokeDasharray="4 4" dot={false} />
              </ComposedChart>
            </ResponsiveContainer>
          </div>

          <div className="card" style={{ padding: 16 }}>
            <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 4 }}>投組組成漂移</div>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 8 }}>股利掃入後，複利目標會越長越大</div>
            <ResponsiveContainer width="100%" height={230}>
              <AreaChart data={R.series} margin={{ left: -8, right: 6, top: 4 }}>
                <CartesianGrid stroke="#EEF1F5" vertical={false} />
                <XAxis dataKey="year" tick={{ fontSize: 11, fill: C.muted }} tickLine={false} axisLine={{ stroke: C.border }} />
                <YAxis tickFormatter={fmtWan} tick={{ fontSize: 10, fill: C.muted }} tickLine={false} axisLine={false} width={48} />
                <Tooltip formatter={(v, n) => [fmtWan(v), (instruments.find((i) => i.id === n) || {}).name || n]} labelFormatter={(y) => "第 " + y + " 年"}
                  contentStyle={{ fontSize: 12, borderRadius: 8, border: "1px solid " + C.border }} />
                {instruments.map((i) => (
                  <Area key={i.id} type="monotone" dataKey={i.id} stackId="1" stroke={i.color} fill={i.color} fillOpacity={0.85} strokeWidth={0} />
                ))}
              </AreaChart>
            </ResponsiveContainer>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 10, marginTop: 8 }}>
              {instruments.map((i) => (
                <span key={i.id} style={{ fontSize: 11, color: C.muted, display: "flex", alignItems: "center", gap: 5 }}>
                  <span style={{ width: 9, height: 9, borderRadius: 2, background: i.color }} />{i.name}
                </span>
              ))}
            </div>
          </div>
        </div>

        <div style={{ fontSize: 11, color: C.muted, marginTop: 14, lineHeight: 1.6, display: "flex", gap: 6 }}>
          <span style={{ flexShrink: 0, marginTop: 1 }}><Coins size={14} /></span>
          <span>純試算工具，非投資建議。模型假設各標的同一毛報酬、直線複利；真實世界報酬不一、會有大幅波動。股價、費用、台積權重請依當天官方資料更新。你的設定會存在這台瀏覽器（localStorage），下次打開還在。</span>
        </div>
      </div>
    </div>
  );
}

/* ---------- 錯誤邊界：render 出錯時顯示訊息，避免整頁空白 ---------- */
class ErrorBoundary extends React.Component {
  constructor(p) { super(p); this.state = { err: null }; }
  static getDerivedStateFromError(err) { return { err }; }
  render() {
    if (this.state.err) {
      return (
        <div style={{ fontFamily: "var(--sans)", color: "#11151C", padding: 24, maxWidth: 640, margin: "40px auto" }}>
          <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 8 }}>發生未預期的錯誤</div>
          <div style={{ fontSize: 13, color: "#6B7480", marginBottom: 12 }}>試算畫面無法繼續顯示。你的設定仍保存在瀏覽器中，可重新整理再試。</div>
          <pre style={{ fontSize: 12, background: "#F2F4F8", padding: 12, borderRadius: 8, overflow: "auto" }}>{String(this.state.err && this.state.err.message || this.state.err)}</pre>
        </div>
      );
    }
    return this.props.children;
  }
}

/* ---------- 啟動：先確認 CDN 相依都載入，失敗就給可讀訊息（取代永久「載入中…」） ---------- */
(function boot() {
  const root = document.getElementById("root");
  clearTimeout(window.__bootWatchdog); // 已進到啟動流程，停掉逾時看門狗
  const missing = [];
  if (typeof React === "undefined" || typeof ReactDOM === "undefined") missing.push("React");
  if (typeof Recharts === "undefined") missing.push("Recharts（圖表）");
  if (missing.length) {
    root.innerHTML = '<div class="boot" style="flex-direction:column;gap:8px;text-align:center;padding:24px">'
      + '<div style="font-size:16px;font-weight:700;color:#11151C">無法載入必要元件：' + missing.join("、") + '</div>'
      + '<div>請確認網路連線後重新整理。本工具首次開啟需連網下載 React 與圖表元件。</div></div>';
    return;
  }
  try {
    ReactDOM.createRoot(root).render(<ErrorBoundary><App /></ErrorBoundary>);
  } catch (e) {
    root.innerHTML = '<div class="boot">啟動失敗：' + String(e && e.message || e) + '</div>';
  }
})();
</script>
</body>
</html>
