/* 引擎 Web Worker：把重模擬（蒙地卡羅／拔靴）移出主執行緒，避免拖曳卡頓。
   正式版 build 會注入 window.__ENGINE_SRC__（引擎原始碼字串）；開發版無此字串時
   回傳 null，呼叫端自動退回主執行緒同步計算（功能不消失）。 */
function makeEngineWorker() {
  try {
    if (typeof Worker === "undefined" || !window.__ENGINE_SRC__) return null;
    const glue = "var window=self;" + window.__ENGINE_SRC__ +
      ";self.onmessage=function(e){var d=e.data;try{var out=self.Engine[d.fn](d.args);self.postMessage({id:d.id,ok:true,out:out});}catch(err){self.postMessage({id:d.id,ok:false,err:String(err)});}};";
    const url = URL.createObjectURL(new Blob([glue], { type: "text/javascript" }));
    return new Worker(url);
  } catch (e) { return null; }
}

/* 在 Worker 執行引擎函式；任何失敗（無 Worker／逾時／例外）皆退回 sync() 同步計算。 */
function runEngine(worker, fn, args, sync) {
  if (!worker) return Promise.resolve(sync());
  return new Promise((resolve) => {
    const id = Math.random().toString(36).slice(2);
    let done = false;
    const finish = (v) => { if (done) return; done = true; clearTimeout(to); worker.removeEventListener("message", onMsg); resolve(v); };
    const onMsg = (e) => { if (e.data && e.data.id === id) finish(e.data.ok ? e.data.out : sync()); };
    const to = setTimeout(() => finish(sync()), 6000);
    worker.addEventListener("message", onMsg);
    try { worker.postMessage({ id, fn, args }); } catch (err) { finish(sync()); }
  });
}

function describePlanExtras(extras = {}, mode = "monthly") {

  return out;
}

/* 依類別權重把 100% 配置攤到使用者目前的標的：
   1) 只保留「實際有標的」的類別權重，並重新正規化到 100（缺的類別權重併回其餘）。
   2) 同類別內平均分配。
   3) 掃入目標優先選 core 且不配息者（如 009816），否則第一檔 core，再否則第一檔。
   回傳 { instruments(套新 alloc), sweepId }；無標的時原樣回傳。 */
function allocateByCategory(instruments, weights) {
  if (!instruments.length) return { instruments, sweepId: null };
  const groups = {};
  instruments.forEach((i) => { const c = CATEGORY_LABEL[i.category] ? i.category : "core"; (groups[c] = groups[c] || []).push(i); });
  const present = Object.keys(groups);
  const wSum = present.reduce((s, c) => s + (num(weights[c]) || 0), 0);
  // 有標的的類別其權重全為 0（例：只有個股卻選保守）→ 退回各類別平均
  const norm = {};
  present.forEach((c) => { norm[c] = wSum > 0 ? (num(weights[c]) || 0) / wSum * 100 : 100 / present.length; });
  const next = instruments.map((i) => {
    const c = CATEGORY_LABEL[i.category] ? i.category : "core";
    const n = groups[c].length;
    return { ...i, alloc: Math.round((norm[c] / n) * 100) / 100 };
  });
  const core = next.filter((i) => i.category === "core");
  const sweep = core.find((i) => !i.distributes) || core[0] || next[0];
  return { instruments: next, sweepId: sweep.id };
}

/* 把任意（可能是舊版／殘缺）的 parsed 物件清成合法 state，缺漏一律回退預設。
   避免舊 localStorage 缺欄位造成 undefined → NaN 汙染整個試算。 */
function sanitizeState(d) {
  if (!d || typeof d !== "object") return { ...DEFAULT_STATE };
  const arr = Array.isArray(d.instruments) ? d.instruments : [];
  const instruments = arr
    .filter((i) => i && (i.id != null))
    .map((i, idx) => ({
      ...INSTRUMENT_DEFAULT,
      ...i,
      id: String(i.id),
      name: i.name != null ? String(i.name) : INSTRUMENT_DEFAULT.name,
      ticker: i.ticker != null ? String(i.ticker) : "",
      // 缺欄位 → 回退模板預設；存在但非數字 → num() 夾成 0，皆不產生 NaN
      price: num(i.price ?? INSTRUMENT_DEFAULT.price),
      alloc: num(i.alloc ?? INSTRUMENT_DEFAULT.alloc),
      fee: num(i.fee ?? INSTRUMENT_DEFAULT.fee),
      divYield: num(i.divYield ?? INSTRUMENT_DEFAULT.divYield),
      tsmcW: num(i.tsmcW ?? INSTRUMENT_DEFAULT.tsmcW),
      sigma: num(i.sigma ?? INSTRUMENT_DEFAULT.sigma),
      distributes: i.distributes != null ? !!i.distributes : INSTRUMENT_DEFAULT.distributes,
      // category 合法則沿用，否則依內扣費用回填（向後相容舊資料）
      category: CATEGORY_LABEL[i.category] ? i.category : guessCategory(i),
      color: i.color || PALETTE[idx % PALETTE.length],
    }));
  const safeInstruments = instruments.length ? instruments : DEFAULTS;
  const mode = d.mode === "lump" ? "lump" : "monthly";
  const sweepId = safeInstruments.some((i) => i.id === d.sweepId) ? d.sweepId : safeInstruments[0].id;
  return {
    instruments: safeInstruments,
    mode,
    budget: num(d.budget),
    gross: num(d.gross),
    years: Math.max(1, Math.round(num(d.years, 1)) || DEFAULT_STATE.years),
    sweepId,
    sigma: num(d.sigma),
    paths: Math.min(20000, Math.max(100, Math.round(num(d.paths, 100)) || DEFAULT_STATE.paths)),
    showAdv: !!d.showAdv,
    model: d.model === "parametric" ? "parametric" : "bootstrap",
    backtest: !!d.backtest,
    dist: d.dist === "t" ? "t" : "normal",
    nu: Math.min(30, Math.max(3, Math.round(num(d.nu, 3)) || DEFAULT_STATE.nu)),
    rho: Math.min(1, Math.max(0, num(d.rho))),
    cape: num(d.cape),
    taxOn: !!d.taxOn,
    divTaxRate: num(d.divTaxRate),
    realView: !!d.realView,
    infl: num(d.infl),
    targetAmt: num(d.targetAmt),
    targetYears: clampTargetYears(d.targetYears),
    contributionGrowth: Math.min(30, Math.max(0, num(d.contributionGrowth))),
    oneTimeYear: Math.min(50, Math.max(0, Math.round(num(d.oneTimeYear)))),
    oneTimeAmount: num(d.oneTimeAmount),
    rebalance: d.rebalance === "annual" ? "annual" : "none",
    withdrawalStartYear: Math.min(80, Math.max(0, Math.round(num(d.withdrawalStartYear)))),
    monthlyWithdrawal: num(d.monthlyWithdrawal),
  };
}

/* ---------- 共用浮層：全螢幕遮罩＋置中白卡（精靈與新增框共用） ---------- */
const Overlay = ({ onClose, maxWidth = 520, children }) => (
  <div onClick={onClose} role="dialog" aria-modal="true"
    style={{ position: "fixed", inset: 0, background: "rgba(20,24,31,.45)", display: "flex", alignItems: "center", justifyContent: "center", padding: 16, zIndex: 50 }}>
    <div className="card" onClick={(e) => e.stopPropagation()}
      style={{ width: "100%", maxWidth, maxHeight: "90vh", overflow: "auto", padding: 22 }}>
      {children}
    </div>
  </div>
);

/* ---------- 新增標的：輸入代號→確定即抓 ---------- */
function AddInstrumentPrompt({ onConfirm, onClose }) {
  const [code, setCode] = useState("");
  const submit = () => { const k = code.trim(); if (k) onConfirm(k); };
  return (
    <Overlay onClose={onClose} maxWidth={420}>
      <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 4 }}>新增標的</div>
      <div style={{ fontSize: 12, color: C.muted, marginBottom: 14, lineHeight: 1.6 }}>
        輸入股票或 ETF 代號，按「確定」後立即抓取名稱、股價、現金殖利率、波動與類別，並馬上計入上方推估。
      </div>
      <input autoFocus className="num" value={code} placeholder="例如 0056、2412、6505"
        onChange={(e) => setCode(e.target.value)}
        onKeyDown={(e) => { if (e.key === "Enter") submit(); if (e.key === "Escape") onClose(); }}
        style={{ ...numInput, width: "100%", fontSize: 15, padding: "10px 12px" }} aria-label="股票或 ETF 代號" />
      <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 16 }}>
        <button className="btn" onClick={onClose}>取消</button>
        <button className="btn" onClick={submit} disabled={!code.trim()}
          style={{ background: code.trim() ? C.ink : "#fff", color: code.trim() ? "#fff" : C.muted, borderColor: code.trim() ? C.ink : C.border }}>確定</button>
      </div>
    </Overlay>
  );
}

/* ---------- 投資計劃精靈：4 問 → 計劃書（即時試算、一鍵套用） ---------- */
function PlanWizard({ instruments, mode, budget, years, planExtras = {}, onApply, onClose }) {
  const [step, setStep] = useState(0);
  const hasWithdrawalPlan = num(planExtras.withdrawalStartYear) > 0 && num(planExtras.monthlyWithdrawal) > 0;
  const [ans, setAns] = useState({ mode, budget: budget || 15000, years: years || 20, profile: "穩健", goal: hasWithdrawalPlan ? "retirement" : "wealth", target: 0 });
  const set = (k, v) => setAns((a) => ({ ...a, [k]: v }));
  const TOTAL = 4; // 步驟 0..3 為提問，步驟 4 為計劃書

  // 依目前標的＋風險屬性的類別權重做配置，跑同步引擎即時預覽。
  // 拔靴 800 條路徑在主執行緒同步算，故只在「計劃書」頁(step===TOTAL)計算，
  // 避免前面填答時每按一鍵都重跑模擬而卡頓。
  const plan = useMemo(() => {
    if (step !== TOTAL) return null;
    const t = PLAN_TEMPLATES[ans.profile];
    const a = allocateByCategory(instruments, t.weights);
    if (!a.instruments.length) return null;
    const common = { instruments: a.instruments, mode: ans.mode, budget: num(ans.budget), gross: t.gross, years: ans.years, sweepId: a.sweepId, ...planExtras };
    const R = simulate({ ...common, tax: null });
    const BS = bootstrapSimulate({ ...common, paths: 800, avgBlock: 6 });
    const need = num(ans.target) > 0 ? solveContribution({ ...common, target: num(ans.target), tax: null }) : 0;
    const feeAvg = a.instruments.reduce((s, i) => s + num(i.alloc) * num(i.fee), 0) / (a.instruments.reduce((s, i) => s + num(i.alloc), 0) || 1);
    const last = BS.series[ans.years] || BS.series[BS.series.length - 1];
    // 目前配置（正規化到 100%）供「現況 → 建議」對照，讓使用者了解現況。
    const curTotal = instruments.reduce((s, i) => s + num(i.alloc), 0) || 1;
    const curMap = {};
    instruments.forEach((i) => { curMap[i.id] = (num(i.alloc) / curTotal) * 100; });
    const sweepName = (a.instruments.find((i) => i.id === a.sweepId) || {}).name || "";
    return {
      t, allocated: a.instruments, sweepId: a.sweepId, sweepName, curMap, invested: R.invested,
      p50: BS.medianFinal, p10: last.p10, p90: last.p90, mult: BS.medianMultiple,
      success: BS.risk.successRate * 100, maxDD: BS.risk.maxDrawdownP90 * 100, cvar: BS.risk.cvar05,
      cashflowNotes: describePlanExtras(planExtras, ans.mode),
      need, feeAvg, hasCore: a.instruments.some((i) => i.category === "core"),
    };
  }, [instruments, ans, step, planExtras]);

  const next = () => setStep((s) => Math.min(TOTAL, s + 1));
  const prev = () => setStep((s) => Math.max(0, s - 1));

  const Qhead = ({ n, title, sub }) => (
    <div style={{ marginBottom: 16 }}>
      <div style={{ fontSize: 11, color: C.muted, letterSpacing: ".04em" }}>第 {n + 1} / {TOTAL} 步</div>
      <div style={{ fontSize: 18, fontWeight: 700, marginTop: 4 }}>{title}</div>
      {sub && <div style={{ fontSize: 12, color: C.muted, marginTop: 4, lineHeight: 1.6 }}>{sub}</div>}
    </div>
  );

  return (
    <Overlay onClose={onClose} maxWidth={step === TOTAL ? 600 : 460}>
      {step === 0 && (
        <div>
          <Qhead n={0} title="你每月（或單筆）可以投入多少？" sub="長期複利最重要的是「持續投入」。先抓一個你穩定拿得出來、不影響生活的金額。" />
          <div style={{ display: "flex", border: "1px solid " + C.border, borderRadius: 8, overflow: "hidden", marginBottom: 12, width: "fit-content" }}>
            {[["monthly", "每月定期"], ["lump", "單筆一次"]].map(([k, l]) => (
              <button key={k} onClick={() => set("mode", k)}
                style={{ padding: "8px 16px", fontSize: 13, border: "none", cursor: "pointer", background: ans.mode === k ? C.ink : "#fff", color: ans.mode === k ? "#fff" : C.muted }}>{l}</button>
            ))}
          </div>
          <label style={{ fontSize: 12, color: C.muted, display: "flex", flexDirection: "column", gap: 6 }}>
            {ans.mode === "monthly" ? "每月金額 (NT$)" : "單筆金額 (NT$)"}
            <input autoFocus className="num" type="number" min="0" step="1000" value={ans.budget}
              onChange={(e) => set("budget", num(e.target.value))} style={{ ...numInput, width: 180, fontSize: 15, padding: "9px 11px" }} aria-label="投入金額" />
          </label>
        </div>
      )}

      {step === 1 && (
        <div>
          <Qhead n={1} title="打算投資多久？" sub="時間是複利最大的朋友。年期拉長，保本率與期末區間通常明顯改善。" />
          <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
            {[10, 20, 30].map((y) => (
              <button key={y} className="btn" onClick={() => set("years", y)}
                style={{ padding: "8px 16px", background: ans.years === y ? C.ink : "#fff", color: ans.years === y ? "#fff" : C.muted, borderColor: ans.years === y ? C.ink : C.border }}>{y} 年</button>
            ))}
          </div>
          <div style={{ fontSize: 13, marginBottom: 6 }}>投資年期 — <b className="num">{ans.years}</b> 年</div>
          <input type="range" min="1" max="40" value={ans.years} onChange={(e) => set("years", +e.target.value)} style={{ width: "100%", accentColor: C.red }} aria-label="投資年期" />
        </div>
      )}

      {step === 2 && (
        <div>
          <Qhead n={2} title="你比較偏好哪種風險屬性？" sub="這會決定核心市值ETF／衛星主動／個股三類的配重，再依你目前持有的標的自動分配。" />
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {PLAN_ORDER.map((p) => {
              const t = PLAN_TEMPLATES[p]; const on = ans.profile === p;
              return (
                <button key={p} onClick={() => set("profile", p)} style={{ textAlign: "left", cursor: "pointer", borderRadius: 12, padding: "12px 14px", border: "1.5px solid " + (on ? C.red : C.border), background: on ? "#FFF6F7" : "#fff" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                    <span style={{ fontSize: 15, fontWeight: 700, color: on ? C.red : C.ink }}>{p}</span>
                    <span className="num" style={{ fontSize: 12, color: C.muted }}>報酬假設 {t.gross}%</span>
                  </div>
                  <div style={{ fontSize: 12, color: C.muted, marginTop: 4, lineHeight: 1.6 }}>{t.blurb}</div>
                  <div className="num" style={{ fontSize: 11, color: C.faint, marginTop: 6 }}>核心 {t.weights.core}％ · 衛星 {t.weights.satellite}％ · 個股 {t.weights.stock}％</div>
                </button>
              );
            })}
          </div>
        </div>
      )}

      {step === 3 && (
        <div>
          <Qhead n={3} title="這份計劃主要用在哪個情境？" sub="情境會影響計劃書的解讀重點；目標金額可選填，填了會額外反推需要投入多少。" />
          <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 12 }}>
            {PLAN_GOALS.map((g) => {
              const on = ans.goal === g.id;
              return (
                <button key={g.id} onClick={() => set("goal", g.id)} style={{ textAlign: "left", cursor: "pointer", borderRadius: 10, padding: "10px 12px", border: "1.5px solid " + (on ? C.blue : C.border), background: on ? "#F2F7FF" : "#fff" }}>
                  <div style={{ fontSize: 13.5, fontWeight: 700, color: on ? C.blue : C.ink }}>{g.title}</div>
                  <div style={{ fontSize: 11.5, color: C.muted, marginTop: 3, lineHeight: 1.5 }}>{g.desc}</div>
                </button>
              );
            })}
          </div>
          <label style={{ fontSize: 12, color: C.muted, display: "flex", flexDirection: "column", gap: 6 }}>
            目標金額 (NT$)
            <input autoFocus className="num" type="number" min="0" step="100000" value={ans.target}
              onChange={(e) => set("target", num(e.target.value))} placeholder="可留空" style={{ ...numInput, width: 200, fontSize: 15, padding: "9px 11px" }} aria-label="目標金額" />
          </label>
        </div>
      )}

      {step === TOTAL && (
        <div>
          <div style={{ fontSize: 11, color: C.muted, letterSpacing: ".04em" }}>你的投資計劃書</div>
          <div style={{ fontSize: 19, fontWeight: 700, margin: "4px 0 12px" }}>{ans.profile}型 · {ans.years} 年計劃</div>
          {!plan ? (
            <div style={{ fontSize: 13, color: C.warn, padding: "16px 0" }}>目前沒有任何標的，請先關閉精靈、新增標的後再規劃。</div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              {/* ① 一句話計劃 */}
              <div style={{ fontSize: 13.5, lineHeight: 1.7, background: "#F4F7FA", borderRadius: 10, padding: "12px 14px" }}>
                以<b>{ans.mode === "monthly" ? "每月 " + fmtNT(num(ans.budget)) : "單筆 " + fmtNT(num(ans.budget))}</b>、年化報酬假設 <b>{plan.t.gross}%</b>，持續投入 <b>{ans.years}</b> 年；
                配置以核心市值ETF為底、依「{ans.profile}」配重，配息標的的現金股利每年掃入複利目標滾入再投資。
              </div>
              {/* ①-b 情境與現金流 */}
              <div style={{ fontSize: 12.5, lineHeight: 1.7, border: "1px solid " + C.border, borderRadius: 10, padding: "10px 12px" }}>
                <b>情境重點</b>：{(PLAN_GOALS.find((g) => g.id === ans.goal) || PLAN_GOALS[0]).title}。
                {plan.cashflowNotes.length ? (
                  <div style={{ marginTop: 6, color: C.muted }}>已納入：{plan.cashflowNotes.join("、")}。</div>
                ) : (
                  <div style={{ marginTop: 6, color: C.muted }}>未啟用投入成長、加碼、退休提領或年度再平衡，計劃以固定投入為主。</div>
                )}
              </div>
              {/* ② 預期成果 */}
              <div>
                <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 8 }}>預期成果（{ans.years} 年後）</div>
                <div className="stat-grid" style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 12 }}>
                  <Stat label="累計投入" val={fmtWan(plan.invested)} sub={fmtNT(plan.invested)} />
                  <Stat label="中位數 (P50)" val={fmtWan(plan.p50)} sub={"成長 " + plan.mult.toFixed(2) + "×"} color={C.red} />
                  <Stat label="區間 P10–P90" val={fmtWan(plan.p10)} sub={"～ " + fmtWan(plan.p90)} color={C.warn} />
                  <Stat label="保本率" val={plan.success.toFixed(0) + "%"} sub="期末 ≥ 投入本金" color={C.blue} />
                </div>
              </div>
              {/* 目標達成 */}
              {num(ans.target) > 0 && (
                <div style={{ fontSize: 13, lineHeight: 1.7, borderLeft: "3px solid " + C.blue, paddingLeft: 12 }}>
                  目標 <b>{fmtNT(num(ans.target))}</b>：在 {plan.t.gross}% 假設、{ans.years} 年下，需{ans.mode === "monthly" ? "每月" : "單筆"}投入約 <b className="num" style={{ color: C.blue }}>{fmtNT(plan.need)}</b>。
                  {num(ans.budget) >= plan.need ? "　你目前的投入已足夠。" : "　比目前多 " + fmtNT(plan.need - num(ans.budget)) + "，可考慮加碼或拉長年期。"}
                </div>
              )}
              {/* ③ 風險提醒 */}
              <div style={{ fontSize: 12.5, lineHeight: 1.7, background: "#FFF6F2", borderRadius: 10, padding: "12px 14px", color: C.ink }}>
                <b style={{ color: C.warn }}>風險提醒</b>：過程中較差的一成路徑，期間最大回檔可能達 <b className="num">約 {plan.maxDD.toFixed(0)}%</b>，最差 5% 情境期末約 {fmtWan(plan.cvar)}。
                下跌是長期投資的常態，最怕的是中途因恐慌賣出而把帳面虧損變成真實虧損——能撐住不賣，才拿得到複利。
              </div>
              {/* ④ 你的配置：現況 → 建議 對照 */}
              <div>
                <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 6 }}>配置對照（現況 → 建議）</div>
                <div style={{ display: "flex", justifyContent: "flex-end", gap: 28, fontSize: 10.5, color: C.faint, marginBottom: 2 }}>
                  <span>現況</span><span>建議</span>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  {plan.allocated.map((i) => {
                    const cur = num(plan.curMap[i.id]);
                    const rec = num(i.alloc);
                    const up = rec > cur + 0.05, down = rec < cur - 0.05;
                    return (
                      <div key={i.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", fontSize: 12.5 }}>
                        <span style={{ color: C.ink }}>{i.name} <span style={{ color: C.faint, fontSize: 11 }}>· {CATEGORY_LABEL[i.category] || "核心市值ETF"}{i.id === plan.sweepId ? " · 複利目標" : ""}</span></span>
                        <span className="num" style={{ display: "flex", gap: 16, alignItems: "baseline" }}>
                          <span style={{ color: C.faint, width: 44, textAlign: "right" }}>{cur.toFixed(0)}%</span>
                          <span style={{ color: C.faint }}>→</span>
                          <span style={{ width: 48, textAlign: "right", fontWeight: 600, color: up ? C.jade : down ? C.warn : C.muted }}>{rec.toFixed(1)}%</span>
                        </span>
                      </div>
                    );
                  })}
                </div>
                <div style={{ fontSize: 11, color: C.muted, marginTop: 8, lineHeight: 1.6 }}>
                  「現況」為你目前各標的配置（正規化為 100%），「建議」為依「{ans.profile}」風險屬性重配後的權重，方便對照要調整的方向。
                  加權平均內扣約 <b className="num">{plan.feeAvg.toFixed(2)}%</b>／年；{ans.years} 年下來費用大約侵蝕本金的 {(plan.feeAvg * ans.years).toFixed(1)}% 量級，內扣越低長期越有利。
                  {plan.hasCore ? "" : "（目前沒有核心市值ETF，分散度偏低，建議至少納入一檔。）"}
                </div>
              </div>
              {/* ④-b 鼓勵股利掃入複利目標 */}
              <div style={{ fontSize: 12.5, lineHeight: 1.7, background: "#EEF8F4", borderRadius: 10, padding: "12px 14px", color: C.ink }}>
                <b style={{ color: C.jade }}>讓股利滾雪球</b>：把配息標的每年領到的現金股利，自動「掃入」一檔不配息的核心市值ETF（例如 {plan.sweepName || "009816"}）持續再投資，零散股利就會變成不中斷的複利，是長期累積最省力的好習慣，建議優先採用。
              </div>
              {/* ⑤ 每月行動 */}
              <div style={{ fontSize: 12.5, lineHeight: 1.8, background: "#F4F7FA", borderRadius: 10, padding: "12px 14px" }}>
                <b>下一步行動</b>
                <ol style={{ margin: "6px 0 0 18px", padding: 0 }}>
                  <li>{ans.mode === "monthly" ? "設定固定扣款日，先以每月 " + fmtNT(num(ans.budget)) + " 執行。" : "確認單筆資金可承受風險，再依建議配置分批或一次投入。"}</li>
                  <li>把「配置對照」中差距最大的標的先調整，避免一次改太多造成判斷混亂。</li>
                  <li>每年底檢查一次配置、內扣費用與目標差距；若收入提高，再回來調整每年投入成長或加碼金額。</li>
                  {ans.goal === "retirement" && <li>退休提領情境要定期檢查 P10 與最差 5% 情境，避免只看中位數。</li>}
                </ol>
              </div>
              {/* ⑥ 免責 */}
              <div style={{ fontSize: 10.5, color: C.faint, lineHeight: 1.6 }}>
                本計劃書為規劃試算，非投資建議。報酬率為假設、配置為起點範本，請依自身情況調整並對自己的資金負責。
              </div>
            </div>
          )}
        </div>
      )}

      {/* 步驟列 */}
      <div style={{ display: "flex", justifyContent: "space-between", gap: 8, marginTop: 20, paddingTop: 14, borderTop: "1px solid " + C.border }}>
        <button className="btn" onClick={step === 0 ? onClose : prev}>{step === 0 ? "取消" : "上一步"}</button>
        {step < TOTAL ? (
          <button className="btn" onClick={next} style={{ background: C.ink, color: "#fff", borderColor: C.ink }}>{step === TOTAL - 1 ? "產生計劃書" : "下一步"}</button>
        ) : (
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", justifyContent: "flex-end" }}>
            <button className="btn" onClick={() => setStep(0)}>重新規劃</button>
            {plan && <button className="btn" onClick={() => onApply(ans, "paramsOnly")}>只套用投入參數</button>}
            {plan && <button className="btn" onClick={() => onApply(ans, "full")} style={{ background: C.red, color: "#fff", borderColor: C.red, fontWeight: 600 }}>套用此計劃</button>}
          </div>
        )}
      </div>
    </Overlay>
  );
}

function App() {
  const [instruments, setInstruments] = useState(DEFAULTS);
  const [mode, setMode] = useState("monthly");
  const [budget, setBudget] = useState(15000);
  const [gross, setGross] = useState(7);
  const [years, setYears] = useState(20);
  const [sweepId, setSweepId] = useState("009816");
  const [sigma, setSigma] = useState(18);
  const [paths, setPaths] = useState(1500);
  const [showAdv, setShowAdv] = useState(false);     // 進階設定區塊是否展開
  const [model, setModel] = useState("bootstrap");   // 'bootstrap'（歷史拔靴，預設）| 'parametric'
  const [backtest, setBacktest] = useState(false);   // 回測校驗頁籤是否展開
  const [dist, setDist] = useState("normal");        // 參數化分布：'normal' | 't'（厚尾）
  const [nu, setNu] = useState(5);                   // Student-t 自由度（愈小尾愈胖）
  const [rho, setRho] = useState(0.7);               // 標的間平均相關係數（單因子等相關）
  const [cape, setCape] = useState(0);               // 台股 CAPE（席勒本益比），0＝不參考
  const [taxOn, setTaxOn] = useState(false);         // 是否計入股利稅負（二代健保+股利稅）
  const [divTaxRate, setDivTaxRate] = useState(28);  // 股利所得稅有效稅率%
  const [realView, setRealView] = useState(false);   // 以實質購買力（平減通膨）顯示
  const [infl, setInfl] = useState(2);               // 年通膨率%
  const [targetAmt, setTargetAmt] = useState(0);     // 目標金額（回推所需投入），0＝不啟用
  const [targetYears, setTargetYears] = useState(20); // 目標達成年期（回推專用，獨立於全域年期）
  const [contributionGrowth, setContributionGrowth] = useState(0); // 每年投入成長率%
  const [oneTimeYear, setOneTimeYear] = useState(0); // 一次性加碼年份，0＝不啟用
  const [oneTimeAmount, setOneTimeAmount] = useState(0); // 一次性加碼金額
  const [rebalance, setRebalance] = useState("none"); // 'none' | 'annual'
  const [withdrawalStartYear, setWithdrawalStartYear] = useState(0); // 第幾年開始退休提領，0＝不啟用
  const [monthlyWithdrawal, setMonthlyWithdrawal] = useState(0); // 退休後每月提領
  const [snapA, setSnapA] = useState(null);          // 情境比較快照 A
  const [snapB, setSnapB] = useState(null);          // 情境比較快照 B
  const [showDetail, setShowDetail] = useState(false); // 年度明細表是否展開
  const [loaded, setLoaded] = useState(false);
  const [priceStatus, setPriceStatus] = useState(null); // {state:'loading'|'ok'|'err', msg, date}
  const [fetchingId, setFetchingId] = useState(null);    // 正在自動抓取基本資料的標的 id
  const fetchedRef = useRef({});                          // 各列已自動抓過的代號，避免重複抓
  const [addOpen, setAddOpen] = useState(false);         // 新增標的彈框是否開啟
  const [planOpen, setPlanOpen] = useState(false);       // 投資計劃精靈是否開啟
  const [showInstrumentHelp, setShowInstrumentHelp] = useState(false); // 手機上收合標的說明

  const applyState = (s) => {
    setInstruments(s.instruments); setMode(s.mode); setBudget(s.budget);
    setGross(s.gross); setYears(s.years); setSweepId(s.sweepId);
    setSigma(s.sigma); setPaths(s.paths); setShowAdv(s.showAdv);
    setModel(s.model); setBacktest(s.backtest);
    setDist(s.dist); setNu(s.nu); setRho(s.rho); setCape(s.cape);
    setTaxOn(s.taxOn); setDivTaxRate(s.divTaxRate); setRealView(s.realView); setInfl(s.infl);
    setTargetAmt(s.targetAmt); setTargetYears(s.targetYears);
    setContributionGrowth(s.contributionGrowth); setOneTimeYear(s.oneTimeYear); setOneTimeAmount(s.oneTimeAmount);
    setRebalance(s.rebalance); setWithdrawalStartYear(s.withdrawalStartYear); setMonthlyWithdrawal(s.monthlyWithdrawal);
  };

  // 套用情境預設：設定毛報酬與參數化分布／相關，並切到參數化模式方便對照。
  const applyPreset = (p) => {
    const v = PRESETS[p]; if (!v) return;
    setGross(v.gross); setRho(v.rho); setDist(v.dist); setNu(v.nu); setModel("parametric");
  };

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (raw) applyState(sanitizeState(JSON.parse(raw)));
    } catch (e) { /* 用預設 */ }
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    try { localStorage.setItem(STORE_KEY, JSON.stringify({ instruments, mode, budget, gross, years, sweepId, sigma, paths, showAdv, model, backtest, dist, nu, rho, cape, taxOn, divTaxRate, realView, infl, targetAmt, targetYears, contributionGrowth, oneTimeYear, oneTimeAmount, rebalance, withdrawalStartYear, monthlyWithdrawal })); }
    catch (e) { /* 忽略 */ }
  }, [instruments, mode, budget, gross, years, sweepId, sigma, paths, showAdv, model, backtest, dist, nu, rho, cape, taxOn, divTaxRate, realView, infl, targetAmt, targetYears, contributionGrowth, oneTimeYear, oneTimeAmount, rebalance, withdrawalStartYear, monthlyWithdrawal, loaded]);

  const tax = taxOn ? { supplement: true, divTaxRate } : null;
  const planExtras = { contributionGrowth, oneTimeYear, oneTimeAmount, rebalance, withdrawalStartYear, monthlyWithdrawal };
  const R = useMemo(() => simulate({ instruments, mode, budget, gross, years, sweepId, tax, ...planExtras }),
    [instruments, mode, budget, gross, years, sweepId, taxOn, divTaxRate, contributionGrowth, oneTimeYear, oneTimeAmount, rebalance, withdrawalStartYear, monthlyWithdrawal]);

  // 引擎 Worker：建一次、卸載時收掉。重模擬走 Worker，失敗自動退回主執行緒。
  const workerRef = useRef(null);
  useEffect(() => { workerRef.current = makeEngineWorker(); return () => { if (workerRef.current) workerRef.current.terminate(); }; }, []);

  // 重模擬輸入用 useDeferredValue 延後合併：拖曳滑桿時 UI 先即時回應，模擬在低優先級重算。
  const dInstruments = useDeferredValue(instruments);
  const dGross = useDeferredValue(gross);
  const dYears = useDeferredValue(years);
  const dTargetYears = useDeferredValue(targetYears);
  const dSigma = useDeferredValue(sigma);
  const dPaths = useDeferredValue(paths);
  const dRho = useDeferredValue(rho);

  // 參數化（蒙地卡羅）只在選參數化模式時計算；經 Worker 非同步取得，sync 為退回路徑。
  const [MC, setMC] = useState(null);
  useEffect(() => {
    if (model !== "parametric") { setMC(null); return; }
    const args = { instruments: dInstruments, mode, budget, gross: dGross, years: dYears, sigma: dSigma, paths: dPaths, dist, nu, rho: dRho, ...planExtras };
    let cancelled = false;
    runEngine(workerRef.current, "monteCarlo", args, () => monteCarlo(args)).then((r) => { if (!cancelled) setMC(r); });
    return () => { cancelled = true; };
  }, [model, dInstruments, mode, budget, dGross, dYears, dSigma, dPaths, dist, nu, dRho, contributionGrowth, oneTimeYear, oneTimeAmount, rebalance, withdrawalStartYear, monthlyWithdrawal]);

  // 歷史平穩拔靴（預設模型）：借歷史波動結構，報酬以 gross 假設 recenter。
  const [BS, setBS] = useState(null);
  useEffect(() => {
    if (model !== "bootstrap") { setBS(null); return; }
    const args = { instruments: dInstruments, mode, budget, gross: dGross, years: dYears, paths: dPaths, avgBlock: 6, ...planExtras };
    let cancelled = false;
    runEngine(workerRef.current, "bootstrapSimulate", args, () => bootstrapSimulate(args)).then((r) => { if (!cancelled) setBS(r); });
    return () => { cancelled = true; };
  }, [model, dInstruments, mode, budget, dGross, dYears, dPaths, contributionGrowth, oneTimeYear, oneTimeAmount, rebalance, withdrawalStartYear, monthlyWithdrawal]);

  // 統一給圖表用的模擬結果（兩模型 series 同形）。
  const SIM = model === "bootstrap" ? BS : MC;

  // 目標達成率：用目標區塊自己的年期重跑一次模型，避免被上方全域年期綁住。
  const [TargetSIM, setTargetSIM] = useState(null);
  useEffect(() => {
    if (!(targetAmt > 0)) { setTargetSIM(null); return; }
    const common = { instruments: dInstruments, mode, budget, gross: dGross, years: dTargetYears, paths: dPaths, target: targetAmt, ...planExtras };
    const args = model === "bootstrap"
      ? { ...common, avgBlock: 6 }
      : { ...common, sigma: dSigma, dist, nu, rho: dRho };
    const fn = model === "bootstrap" ? "bootstrapSimulate" : "monteCarlo";
    const sync = () => (model === "bootstrap" ? bootstrapSimulate(args) : monteCarlo(args));
    let cancelled = false;
    runEngine(workerRef.current, fn, args, sync).then((r) => { if (!cancelled) setTargetSIM(r); });
    return () => { cancelled = true; };
  }, [model, targetAmt, dTargetYears, dInstruments, mode, budget, dGross, dPaths, dSigma, dist, nu, dRho, contributionGrowth, oneTimeYear, oneTimeAmount, rebalance, withdrawalStartYear, monthlyWithdrawal]);

  // 目標金額回推：達成 targetAmt 所需的每月（或單筆）投入。
  const targetNeed = useMemo(() => (targetAmt > 0
    ? solveContribution({ instruments, mode, gross, years: targetYears, sweepId, target: targetAmt, tax, ...planExtras })
    : 0),
    [targetAmt, targetYears, instruments, mode, gross, sweepId, taxOn, divTaxRate, contributionGrowth, oneTimeYear, oneTimeAmount, rebalance, withdrawalStartYear, monthlyWithdrawal]);

  // 反推「達標所需年化毛報酬」：固定目前投入與年期，二分搜尋使直線試算期末 ≥ 目標的 gross。
  // 與 targetNeed 互補——一個答「要投多少」、一個答「要幾 % 報酬」，並對報酬高低給可行性提示。
  // 直線試算期末對 gross 單調遞增，故二分搜尋必收斂。
  const requiredReturn = useMemo(() => {
    if (!(targetAmt > 0)) return null;
    const base = { instruments, mode, budget, sweepId, tax, ...planExtras };
    const finalAt = (g) => simulate({ ...base, gross: g, years: targetYears }).finalTotal;
    if (finalAt(60) < targetAmt) return { rate: Infinity };   // 即使年化 60% 也達不到
    if (finalAt(0) >= targetAmt) return { rate: 0 };           // 光靠本金（不靠報酬）就達標
    let lo = 0, hi = 60;
    for (let i = 0; i < 60; i++) { const mid = (lo + hi) / 2; if (finalAt(mid) >= targetAmt) hi = mid; else lo = mid; }
    return { rate: hi };
  }, [targetAmt, targetYears, instruments, mode, budget, sweepId, taxOn, divTaxRate, contributionGrowth, oneTimeYear, oneTimeAmount, rebalance, withdrawalStartYear, monthlyWithdrawal]);

  // 對「所需報酬率」給白話可行性判語：報酬越高＝越要冒波動、歷史上越難持續。
  const returnVerdict = (rate) => {
    if (!Number.isFinite(rate)) return { c: C.red, t: "即使年化 60% 也達不到——這個目標相對你目前的投入與年期太高，請拉長年期或提高每月投入。" };
    if (rate <= 0.5) return { c: C.jade, t: "幾乎光靠本金就能達標，不太需要承擔報酬風險。" };
    if (rate <= 6) return { c: C.jade, t: "相當保守、容易達成；以全市值型 ETF 長期水準即可，波動也最小。" };
    if (rate <= 9) return { c: C.blue, t: "接近台股市值型 ETF 的長期水準，合理但需長期紀律、忍受中途波動。" };
    if (rate <= 12) return { c: C.warn, t: "偏積極，通常得配置較高波動部位；過程回檔可能很深，最怕撐不住而賣在低點。" };
    return { c: C.red, t: "歷史上長期很難持續，多半得冒很大風險或靠運氣。建議拉長年期、提高投入或下修目標，別硬追高報酬。" };
  };

  // 情境快照：記下目前設定與累積資產序列，供 A/B 疊圖與差異表。
  const takeSnapshot = (label) => ({
    label, mode, budget, gross, years,
    finalTotal: R.finalTotal, invested: R.invested,
    series: R.series.map((d) => ({ year: d.year, total: d.total })),
  });
  // A/B 比較圖資料：以年對齊兩快照的累積資產。
  const cmpData = useMemo(() => {
    if (!snapA || !snapB) return null;
    const n = Math.max(snapA.series.length, snapB.series.length);
    return Array.from({ length: n }, (_, y) => ({
      year: y,
      a: snapA.series[y] ? snapA.series[y].total : null,
      b: snapB.series[y] ? snapB.series[y].total : null,
    }));
  }, [snapA, snapB]);

  // 歷史回測校驗：用實際歷史月報酬跑滾動視窗（不抽樣、不 recenter）。
  // 歷史長度有限（約 23 年），年期超過可用歷史時無法湊出任何完整視窗，會算出 NaN／0；
  // 此時回 null，由 UI 提示縮短年期，避免顯示垃圾數字。
  const BT = useMemo(() => {
    if (!backtest) return null;
    if (years * 12 > window.Engine.HIST_RETURNS.monthly.length) return null;
    return historicalBacktest({ mode, budget, years });
  }, [backtest, mode, budget, years]);

  // 圖表資料：把回測「最近一段實績」疊成 hist 線（與模擬機率帶同 year 對齊）。
  const chartData = useMemo(() => {
    if (!SIM) return null;
    let s = BT
      ? SIM.series.map((d, idx) => ({ ...d, hist: BT.last.series[idx] ? BT.last.series[idx].total : null }))
      : SIM.series;
    return realView ? toReal(s, { infl }) : s;
  }, [SIM, BT, realView, infl]);

  // 實質購買力平減因子（年期末）；非實質模式為 1。供統計卡的名目金額換算。
  const realF = realView ? Math.pow(1 + num(infl) / 100, years) : 1;

  const allocSum = instruments.reduce((s, i) => s + num(i.alloc), 0);

  // 抓最新收盤價：上市走證交所 OpenAPI、上櫃走櫃買中心 TPEx OpenAPI，皆免金鑰、
  // 單次回傳全市場（含 ETF）。兩者都未送 CORS 標頭，純前端直連會被瀏覽器擋下，
  // 故每個來源都依序嘗試「直連 → corsproxy.io → allorigins」，任一成功即止。
  const PROXIES = (target) => [
    target,
    "https://corsproxy.io/?url=" + encodeURIComponent(target),
    "https://api.allorigins.win/raw?url=" + encodeURIComponent(target),
  ];
  const FETCH_TIMEOUT_MS = 8000;
  // 三個來源並行競速：誰先成功回傳非空陣列就採用（各代理回傳同一份資料，誰先到都正確），
  // 不再序列空等較慢的代理；全部失敗才回 null。
  const raceJson = async (urls, pick) => {
    const attempt = async (url) => {
      const ctl = typeof AbortController !== "undefined" ? new AbortController() : null;
      const timer = ctl ? setTimeout(() => ctl.abort(), FETCH_TIMEOUT_MS) : null;
      let res;
      try { res = await fetch(url, ctl ? { signal: ctl.signal } : undefined); }
      finally { if (timer) clearTimeout(timer); }
      if (!res.ok) throw new Error("bad status " + res.status);
      const data = pick(await res.json());
      if (data) return data;
      throw new Error("empty");
    };
    try { return await Promise.any(urls.map(attempt)); }
    catch (e) { return null; }
  };
  const fetchJsonWithProxy = (target) =>
    raceJson(PROXIES(target), (d) => (Array.isArray(d) && d.length ? d : null));
  // FinMind 逐檔備援（免 token）：抓近 14 日收盤取最後一筆，回傳 {price, divYield}。
  const fetchFinMind = async (code) => {
    const d = new Date(); d.setDate(d.getDate() - 14);
    const start = d.toISOString().slice(0, 10);
    const get = (dataset) => {
      const target = "https://api.finmindtrade.com/api/v4/data?dataset=" + dataset + "&data_id=" + encodeURIComponent(code) + "&start_date=" + start;
      return raceJson(PROXIES(target), (j) => (j && Array.isArray(j.data) && j.data.length ? j.data : null));
    };
    const out = {};
    const [px, per] = await Promise.all([get("TaiwanStockPrice"), get("TaiwanStockPER")]);
    if (px) { const p = num(px[px.length - 1].close); if (p > 0) out.price = p; }
    if (per) { const y = num(per[per.length - 1].dividend_yield); if (y > 0) out.divYield = y; }
    return out;
  };
  const fetchPrices = async () => {
    setPriceStatus({ state: "loading" });
    const parsePrice = (v) => num(String(v == null ? "" : v).replace(/,/g, "")); // 去除千分位逗號
    const map = {}, ymap = {}, nmap = {};
    // 上市收盤、上櫃收盤、上市殖利率/PER 三來源並行抓取，各自處理代理備援
    const [tw, tp, yld] = await Promise.all([
      fetchJsonWithProxy("https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_AVG_ALL"),
      fetchJsonWithProxy("https://www.tpex.org.tw/openapi/v1/tpex_mainboard_daily_close_quotes"),
      fetchJsonWithProxy("https://openapi.twse.com.tw/v1/exchangeReport/BWIBBU_ALL"),
    ]);
    if (tw) tw.forEach((r) => { const c = r.Code; if (c) { const k = String(c).trim(); map[k] = parsePrice(r.ClosingPrice); if (r.Name) nmap[k] = String(r.Name).trim(); } });
    // TPEx 欄位名以 SecuritiesCompanyCode / Close 為主，保留備援鍵名以防欄位調整
    if (tp) tp.forEach((r) => {
      const c = r.SecuritiesCompanyCode || r.Code || r.CompanyCode;
      if (c) { const k = String(c).trim(); map[k] = parsePrice(r.Close != null ? r.Close : r.ClosingPrice); const nm = r.CompanyName || r.Name; if (nm && !nmap[k]) nmap[k] = String(nm).trim(); }
    });
    // BWIBBU_ALL：殖利率欄位以 DividendYield 為主，順帶補名稱
    if (yld) yld.forEach((r) => { const c = r.Code; if (c) { const k = String(c).trim(); ymap[k] = num(r.DividendYield); if (r.Name && !nmap[k]) nmap[k] = String(r.Name).trim(); } });

    // 大盤來源全失敗：逐檔改走 FinMind 備援（並行抓取，持有檔數不多）
    let usedFinMind = 0;
    if (!tw && !tp) {
      const keys = instruments.map((i) => String(i.ticker || "").trim()).filter(Boolean);
      const results = await Promise.all(keys.map((k) => fetchFinMind(k)));
      keys.forEach((key, idx) => {
        const r = results[idx];
        if (r.price) { map[key] = r.price; usedFinMind++; }
        if (r.divYield != null) ymap[key] = r.divYield;
      });
      if (!usedFinMind) {
        setPriceStatus({ state: "err", msg: "抓取失敗（上市/上櫃 OpenAPI、CORS 代理與 FinMind 備援皆無法連線），可改手動填入。", date: null });
        return;
      }
    }

    let hit = 0, yhit = 0, miss = [];
    setInstruments((arr) => arr.map((i) => {
      const key = String(i.ticker || "").trim();
      const p = map[key];
      const y = ymap[key];
      const next = { ...i };
      if (key && Number.isFinite(p) && p > 0) { hit++; next.price = p; }
      else if (key) miss.push(key);
      if (key && Number.isFinite(y) && y >= 0 && Object.prototype.hasOwnProperty.call(ymap, key)) { yhit++; next.divYield = y; }
      // 名稱僅在空白或仍是預設「新標的」時補上，不覆蓋使用者自訂
      if (key && nmap[key] && (!i.name || i.name === "新標的")) next.name = nmap[key];
      // 內扣費用無 API，順手以內建費率表刷新（欄位已鎖定）
      if (key) next.fee = lookupFee(key, i.category);
      return next;
    }));
    const srcParts = [];
    if (tw) srcParts.push("上市"); if (tp) srcParts.push("上櫃");
    if (yld) srcParts.push("殖利率"); if (usedFinMind) srcParts.push("FinMind×" + usedFinMind);
    setPriceStatus({
      state: "ok",
      msg: "已更新股價 " + hit + " 檔、殖利率 " + yhit + " 檔（來源：" + (srcParts.join("+") || "—") + "）" + (miss.length ? "，查無：" + miss.join("、") : ""),
      date: new Date().toLocaleDateString("zh-TW"),
    });
  };

  // 新增標的自動帶入：以 FinMind（免 token）為主、走既有代理鏈，best-effort 回傳
  // { name, price, divYield, sigma }，抓不到的欄位略過（保留原值）。
  const fetchInstrumentBasics = async (code) => {
    const out = {};
    const d = new Date(); d.setDate(d.getDate() - 430); // 約 14 個月日線供年化波動估計
    const start = d.toISOString().slice(0, 10);
    const get = (dataset, sd) => {
      const target = "https://api.finmindtrade.com/api/v4/data?dataset=" + dataset + "&data_id=" + encodeURIComponent(code) + (sd ? "&start_date=" + sd : "");
      return raceJson(PROXIES(target), (j) => (j && Array.isArray(j.data) && j.data.length ? j.data : null));
    };
    // 三個資料集並行抓取
    const [info, px, per] = await Promise.all([
      get("TaiwanStockInfo"), get("TaiwanStockPrice", start), get("TaiwanStockPER", start),
    ]);
    if (info) {
      const last = info[info.length - 1];
      const nm = last.stock_name; if (nm) out.name = String(nm).trim();
      // 由產業別猜類別：ETF／指數型 → 核心市值（core），其餘視為個股（stock）。
      // 主動型 ETF 無法由 API 區分，仍歸 core，使用者可在表格改為「衛星主動」。
      const ind = String(last.industry_category || "");
      if (/ETF|指數|ETN/i.test(ind)) out.category = "core";
      else if (ind && ind !== "Index") out.category = "stock";
    }
    if (px) {
      const last = num(px[px.length - 1].close); if (last > 0) out.price = last;
      // 年化波動% ＝ 日對數報酬標準差 ×√252
      const closes = px.map((r) => num(r.close)).filter((v) => v > 0);
      if (closes.length > 20) {
        const rets = [];
        for (let k = 1; k < closes.length; k++) rets.push(Math.log(closes[k] / closes[k - 1]));
        const mean = rets.reduce((s, v) => s + v, 0) / rets.length;
        const variance = rets.reduce((s, v) => s + (v - mean) * (v - mean), 0) / (rets.length - 1);
        const sig = Math.sqrt(variance * 252) * 100;
        if (Number.isFinite(sig) && sig > 0) out.sigma = Math.round(sig * 10) / 10;
      }
    }
    if (per) { const y = num(per[per.length - 1].dividend_yield); if (y > 0) out.divYield = y; }
    // 內扣費用：無 API，改查內建費率表（依代號與類別）
    out.fee = lookupFee(code, out.category);
    return out;
  };
  // 抓取代號基本資料並把非空欄位（含類別）merge 回該列；回傳抓到的物件（失敗為 {}）。
  // 共用於「表格代號欄自動帶入」與「新增標的彈框即抓」。
  const mergeFetched = async (id, code) => {
    const key = String(code || "").trim();
    if (!key) return {};
    setFetchingId(id);
    try {
      const b = await fetchInstrumentBasics(key);
      setInstruments((arr) => arr.map((i) => {
        if (i.id !== id) return i;
        const next = { ...i };
        if (b.name) next.name = b.name;
        if (b.price != null) next.price = b.price;
        if (b.divYield != null) next.divYield = b.divYield;
        if (b.sigma != null) next.sigma = b.sigma;
        if (b.category) next.category = b.category;
        if (b.fee != null) next.fee = b.fee;
        return next;
      }));
      return b;
    } catch (e) { return {}; }       // 抓取失敗：保留原值
    finally { setFetchingId(null); }
  };
  // 代號輸入失焦/Enter 時觸發：抓基本資料並回填非空欄位；同代號不重複抓。
  const autoFillRow = (id, code) => {
    const key = String(code || "").trim();
    if (!key || fetchedRef.current[id] === key) return;
    fetchedRef.current[id] = key;
    return mergeFetched(id, key);
  };
  // 新增標的：彈框輸入代號→確定後立即建列、馬上抓資料並計入推估。
  const addInstrument = async (code) => {
    const key = String(code || "").trim();
    if (!key) return;
    const id = "X" + Math.random().toString(36).slice(2, 6);
    setInstruments((arr) => [...arr, {
      ...INSTRUMENT_DEFAULT, id, ticker: key, name: "抓取中…",
      color: PALETTE[arr.length % PALETTE.length],
    }]);
    setAddOpen(false);
    fetchedRef.current[id] = key;
    const b = await mergeFetched(id, key);
    // 抓不到名稱時退回「新標的」，避免一直停在「抓取中…」
    if (!b.name) setInstruments((arr) => arr.map((i) => (i.id === id && i.name === "抓取中…" ? { ...i, name: "新標的" } : i)));
  };

  const update = (id, k, v) => setInstruments((arr) => arr.map((i) => (i.id === id ? { ...i, [k]: v } : i)));
  const removeRow = (id) => setInstruments((arr) => {
    const next = arr.filter((i) => i.id !== id);
    if (id === sweepId && next.length) setSweepId(next[0].id);
    return next;
  });
  const reset = () => {
    if (!window.confirm("確定要清除目前所有設定並還原預設值嗎？此動作無法復原。")) return;
    applyState({ ...DEFAULT_STATE });
  };

  // 套用投資計劃：以目前 state 為基底，依精靈答案覆寫。
  // scope==="full"：依風險屬性的類別權重把你「目前的標的」重新配重（不重置成預設），
  //                  並設定掃入目標、毛報酬、投入參數、目標金額、改用拔靴模型。
  // scope==="paramsOnly"：只覆寫投入方式/金額/年期/毛報酬（與目標金額），標的與配置不動。
  const applyPlan = (answers, scope) => {
    const t = PLAN_TEMPLATES[answers.profile] || PLAN_TEMPLATES["穩健"];
    const base = {
      instruments, mode, budget, gross, years, sweepId, sigma, paths, showAdv,
      model, backtest, dist, nu, rho, cape, taxOn, divTaxRate, realView, infl, targetAmt, targetYears,
      contributionGrowth, oneTimeYear, oneTimeAmount, rebalance, withdrawalStartYear, monthlyWithdrawal,
    };
    const next = { ...base, mode: answers.mode, budget: num(answers.budget), years: answers.years, gross: t.gross, targetAmt: num(answers.target) || 0, targetYears: answers.years };
    if (scope === "full") {
      const a = allocateByCategory(instruments, t.weights);
      next.instruments = a.instruments;
      if (a.sweepId) next.sweepId = a.sweepId;
      next.model = "bootstrap";
    }
    applyState(sanitizeState(next));
    setPlanOpen(false);
  };

  // 規劃用統計：以目前模型的模擬結果（SIM）為準；達標/保本依模型取對應欄位。
  // 取 series 最後一筆（期末）而非用 years 索引：SIM 以 deferred 的 dYears 計算，
  // years 一變動會領先一個 render，用 SIM.series[years] 可能取到 undefined 而崩潰。
  const simEnd = SIM ? SIM.series[SIM.series.length - 1] : null;
  const simStat = SIM ? {
    p50: SIM.medianFinal, mult: SIM.medianMultiple,
    p10: simEnd.p10, p90: simEnd.p90,
    success: model === "bootstrap" ? SIM.risk.successRate * 100 : SIM.aboveInvested,
  } : null;
  const targetEnd = TargetSIM ? TargetSIM.series[TargetSIM.series.length - 1] : null;
  const targetStat = TargetSIM && targetEnd ? {
    p50: TargetSIM.medianFinal,
    p10: targetEnd.p10,
    p90: targetEnd.p90,
    success: model === "bootstrap" ? TargetSIM.risk.successRate * 100 : TargetSIM.targetSuccess,
  } : null;

  return (

                onChange={(e) => setBudget(num(e.target.value))} />

                <input type="range" min="0" max="15" step="0.5" value={gross} onChange={(e) => setGross(+e.target.value)} style={{ flex: 1, accentColor: C.red }} />
                <span className="hidemob" style={{ display: "flex", gap: 4 }}>
                  {[["保守", 5], ["基準", 7], ["樂觀", 9]].map(([l, v]) => (

              </Field>
              <Field label="每月提領">
                <input className="num" type="number" min="0" step="1000" value={monthlyWithdrawal}
                  onChange={(e) => setMonthlyWithdrawal(num(e.target.value))} aria-label="退休後每月提領" style={{ ...numInput }} />

            </div>
            <div style={{ fontSize: 10.5, color: C.faint, marginTop: 8, lineHeight: 1.5 }}>
              加碼年份填 0 代表不加碼；提領開始年填 0 代表不提領。每年投入成長適合模擬薪資成長後逐年加碼，年度再平衡會在每年底把各標的調回配置比例。
            </div>
          </div>
        </div>

        <div className="card" style={{ padding: 20, marginBottom: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
            <div>
              <div className="section-title">未來資產推估</div>
              <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>以目前的投入與分配持續買進 {years} 年，資產可能的區間與保本機率。預設用台股歷史報酬做「平穩拔靴」，已含波動與序列報酬風險。</div>
            </div>
            <button className="btn" onClick={() => setShowAdv((v) => !v)} aria-pressed={showAdv}
              style={{ background: showAdv ? C.ink : "#fff", color: showAdv ? "#fff" : C.muted, borderColor: showAdv ? C.ink : C.border }}>
              {showAdv ? "進階設定：開" : "進階設定"}

          </div>

          {simStat ? (
            <div style={{ marginTop: 16 }}>
              {/* 規劃統計列（永遠顯示） */}
              <div className="grid2 stat-grid" style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 14, marginBottom: 14 }}>
                <Stat label={mode === "monthly" ? years + " 年累計投入" : "投入本金"} val={fmtWan(R.invested)} sub={fmtNT(R.invested)} />
                <Stat label="中位數預期 (P50)" val={fmtWan(simStat.p50 / realF)} sub={"成長 " + simStat.mult.toFixed(2) + "×"} color={C.red} />

              {/* 未來資產推估主圖（永遠顯示） */}
              <ResponsiveContainer width="100%" height={260}>
                <ComposedChart data={chartData} margin={{ left: -8, right: 6, top: 4 }}>
                  <CartesianGrid stroke="#EEF1F5" vertical={false} />
                  <XAxis dataKey="year" tick={{ fontSize: 11, fill: C.muted }} tickLine={false} axisLine={{ stroke: C.border }} />
                  <YAxis tickFormatter={fmtWan} tick={{ fontSize: 10, fill: C.muted }} tickLine={false} axisLine={false} width={48} />
                  <Tooltip
                    formatter={(v, n) => {
                      if (n === "band") return [fmtWan(v[0]) + " ～ " + fmtWan(v[1]), "P10–P90 區間"];

                    }}
                    labelFormatter={(y) => "第 " + y + " 年"}
                    contentStyle={{ fontSize: 12, borderRadius: 8, border: "1px solid " + C.border }} />
                  <Area dataKey="band" stroke="none" fill={C.blue} fillOpacity={0.14} />
                  <Line type="monotone" dataKey="p50" stroke={C.red} strokeWidth={2.2} dot={false} />
                  <Line type="monotone" dataKey="invested" stroke={C.muted} strokeWidth={1.4} strokeDasharray="4 4" dot={false} />
                  {BT && <Line type="monotone" dataKey="hist" stroke={C.jade} strokeWidth={2} dot={false} />}

              {/* 圖說（永遠顯示） */}
              <div style={{ fontSize: 11, color: C.muted, marginTop: 8, lineHeight: 1.6 }}>
                {model === "bootstrap"
                  ? "藍色帶＝歷史拔靴 " + SIM.paths.toLocaleString() + " 條路徑的 P10–P90 範圍；借用台股歷史的波動、厚尾與序列相依，報酬已平移到你的毛報酬假設。紅線＝中位數預期，灰虛線＝累計投入本金。"
                  : "藍色帶＝" + SIM.paths.toLocaleString() + " 條隨機路徑中 P10–P90 的範圍；紅線＝中位數預期，灰虛線＝累計投入本金。σ=0 時三條分位數會重合、回到直線試算。"}
                {realView ? "（已以年通膨 " + infl + "% 平減為今日購買力）" : ""}
              </div>

              {/* 目標金額回推（內嵌） */}
              <div style={{ marginTop: 16, paddingTop: 16, borderTop: "1px solid " + C.border }}>
                <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 4 }}>目標金額回推</div>
                <div style={{ fontSize: 11, color: C.muted, marginBottom: 10 }}>設定想在幾年內達到的金額，給你兩條達標路徑：① 維持報酬假設、要投多少；② 維持目前投入、需要幾 % 報酬（並提示這個報酬合不合理）。此處年期可獨立設定，不影響上方圖表的全域年期。</div>
                <div style={{ display: "flex", gap: 14, alignItems: "center", flexWrap: "wrap" }}>
                  <label style={{ fontSize: 12, color: C.muted, display: "flex", gap: 6, alignItems: "center" }}>
                    目標金額 (NT$)
                    <input className="num" type="number" min="0" step="100000" value={targetAmt} onChange={(e) => setTargetAmt(num(e.target.value))} aria-label="目標金額" style={{ ...numInput, width: 140 }} />
                  </label>
                  <label style={{ fontSize: 12, color: C.muted, display: "flex", gap: 6, alignItems: "center" }}>
                    幾年內達成
                    <input className="num" type="number" min="1" max="50" step="1" value={targetYears} onChange={(e) => setTargetYears(clampTargetYears(e.target.value, 1))} aria-label="達成年期" style={{ ...numInput, width: 80 }} />
                    年
                  </label>
                  {targetAmt > 0 && (
                    <div style={{ fontSize: 13 }}>
                      ① 需{mode === "monthly" ? "每月投入" : "單筆投入"} <b className="num" style={{ fontSize: 18, color: C.red }}>{fmtNT(targetNeed)}</b>{" "}
                      <span style={{ fontSize: 11, color: C.muted }}>（年化 {gross}% 假設、{targetYears} 年{taxOn ? "、含股利稅" : ""}）</span>
                    </div>
                  )}
                </div>
                {targetAmt > 0 && requiredReturn && (() => {
                  const v = returnVerdict(requiredReturn.rate);
                  return (
                    <div style={{ fontSize: 12.5, lineHeight: 1.7, marginTop: 10, background: "#F4F7FA", borderRadius: 8, padding: "10px 12px" }}>
                      <div style={{ fontSize: 13 }}>
                        ② 維持目前{mode === "monthly" ? "每月 " + fmtNT(num(budget)) : "單筆 " + fmtNT(num(budget))}、{targetYears} 年，{Number.isFinite(requiredReturn.rate)
                          ? <>需要年化約 <b className="num" style={{ fontSize: 18, color: v.c }}>{requiredReturn.rate.toFixed(1)}%</b> 毛報酬才能達標</>
                          : <b style={{ color: v.c }}>在合理報酬範圍內難以達標</b>}。
                      </div>
                      <div style={{ fontSize: 12, color: v.c, marginTop: 4 }}>{v.t}</div>
                      <div style={{ fontSize: 10.5, color: C.faint, marginTop: 4 }}>提示：報酬率越高代表波動越大，沒有「只高報酬、不高風險」的組合。此為直線試算（中位數）反推，達到此報酬仍約有一半機率因波動而未達標；僅供量級參考，非投資建議。</div>

                    {targetStat ? (
                      <>
                        <div style={{ fontSize: 13 }}>
                          ③ 維持目前投入、{targetYears} 年，目標達成率約 <b className="num" style={{ fontSize: 18, color: C.jade }}>{targetStat.success.toFixed(0)}%</b>
                          <span style={{ color: C.muted }}>（期末資產 ≥ {fmtNT(targetAmt)}）</span>。

                        <div className="num" style={{ fontSize: 11.5, color: C.muted, marginTop: 4 }}>

                        </div>

                <div style={{ marginTop: 16, paddingTop: 16, borderTop: "1px solid " + C.border }}>

              <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap", alignItems: "center" }}>

                  <button key={k} className="btn" onClick={() => setModel(k)} aria-pressed={model === k}

	按「新增標的」會跳出輸入框，填代號（如 0056、2412、6505）按確定即立刻抓取名稱、股價、現金殖利率、波動%與內扣%並計入推估；也可直接在「代號」欄改代號（失焦或按 Enter 重抓）。名稱、股價、內扣%、現金殖利%、波動%五欄為自動帶入、已鎖定不可手動編輯（灰底欄位），要更新可重抓代號或按上方「更新股價」。你只需設定「配置%」並勾選「配息」。

            「配息」其實是選股利再投入方式，兩種都會再投資、差別在投到哪：打勾＝該檔現金股利每年底自動「掃進」你選的複利目標（預設 009816）集中滾；不打勾＝股利留在原檔自己複利（等同原地再投入）。複利目標本身不配息、吸收各檔掃來的股利全部滾入。注意：勾不勾都不是把錢領出來花掉。

        {/* 情境比較 A / B */}
        <div className="card" style={{ padding: 20, marginBottom: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10, marginBottom: 8 }}>
            <div>
              <div className="section-title">情境比較 A / B</div>
              <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>把目前設定存成 A 或 B 兩個快照，疊圖比較累積資產與期末差異。</div>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button className="btn" onClick={() => setSnapA(takeSnapshot("A"))}>存為情境 A</button>
              <button className="btn" onClick={() => setSnapB(takeSnapshot("B"))}>存為情境 B</button>
              {(snapA || snapB) && <button className="btn" onClick={() => { setSnapA(null); setSnapB(null); }}>清除</button>}
            </div>
          </div>
          {(snapA || snapB) && (
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 8, lineHeight: 1.6 }}>
              {snapA ? "A：" + (snapA.mode === "monthly" ? "每月 " : "單筆 ") + fmtNT(snapA.budget) + "、" + snapA.gross + "%、" + snapA.years + " 年 → " + fmtWan(snapA.finalTotal) : "A：未設定"}
              {"　｜　"}
              {snapB ? "B：" + (snapB.mode === "monthly" ? "每月 " : "單筆 ") + fmtNT(snapB.budget) + "、" + snapB.gross + "%、" + snapB.years + " 年 → " + fmtWan(snapB.finalTotal) : "B：未設定"}
            </div>
          )}
          {cmpData && (
            <React.Fragment>
              <ResponsiveContainer width="100%" height={220}>
                <ComposedChart data={cmpData} margin={{ left: -8, right: 6, top: 4 }}>
                  <CartesianGrid stroke="#EEF1F5" vertical={false} />
                  <XAxis dataKey="year" tick={{ fontSize: 11, fill: C.muted }} tickLine={false} axisLine={{ stroke: C.border }} />
                  <YAxis tickFormatter={fmtWan} tick={{ fontSize: 10, fill: C.muted }} tickLine={false} axisLine={false} width={48} />
                  <Tooltip formatter={(v, n) => [fmtWan(v), n === "a" ? "情境 A" : "情境 B"]} labelFormatter={(y) => "第 " + y + " 年"} contentStyle={{ fontSize: 12, borderRadius: 8, border: "1px solid " + C.border }} />
                  <Line type="monotone" dataKey="a" stroke={C.blue} strokeWidth={2.2} dot={false} />
                  <Line type="monotone" dataKey="b" stroke={C.red} strokeWidth={2.2} dot={false} />
                </ComposedChart>
              </ResponsiveContainer>
              <div style={{ fontSize: 12, color: C.muted, marginTop: 6 }}>
                期末差異（B − A）：<b className="num" style={{ color: (snapB.finalTotal - snapA.finalTotal) >= 0 ? C.jade : C.red }}>{fmtWan(snapB.finalTotal - snapA.finalTotal)}</b>
                {"，"}B 為 A 的 <b className="num">{(snapB.finalTotal / (snapA.finalTotal || 1)).toFixed(2)}</b> 倍。
              </div>
            </React.Fragment>
          )}
        </div>

        {/* 年度明細 */}
        <div className="card" style={{ padding: 20, marginBottom: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <div className="section-title">年度明細</div>
            <button className="btn" onClick={() => setShowDetail((v) => !v)} aria-pressed={showDetail}>{showDetail ? "收合表格" : "展開表格"}</button>
          </div>
          {showDetail && (
            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 480 }}>
                <thead>
                  <tr style={{ fontSize: 10.5, color: C.muted }}>
                    {["年", "投入本金", "累積總額", "當年掃入股利"].map((h, j) => (
                      <th key={j} style={{ padding: "4px 8px", fontWeight: 500, textAlign: j === 0 ? "left" : "right" }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {R.series.map((d) => (
                    <tr key={d.year} style={{ borderTop: "1px solid " + C.border }}>
                      <td className="num" style={{ padding: "4px 8px" }}>{d.year}</td>
                      <td className="num" style={{ padding: "4px 8px", textAlign: "right" }}>{fmtNT(d.invested)}</td>
                      <td className="num" style={{ padding: "4px 8px", textAlign: "right", fontWeight: 600 }}>{fmtNT(d.total)}</td>
                      <td className="num" style={{ padding: "4px 8px", textAlign: "right", color: C.muted }}>{fmtNT(d.divSwept || 0)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>

        <div style={{ fontSize: 11, color: C.muted, marginTop: 14, lineHeight: 1.6, display: "flex", gap: 6 }}>
          <span style={{ flexShrink: 0, marginTop: 1 }}><Coins size={14} /></span>
          <span>純規劃試算工具，非投資建議。所有報酬率皆為假設，模型簡化（各標的同一毛報酬、機率帶借用台股歷史波動結構），不代表未來表現。股價、殖利率、波動會自動帶入估算值，內扣費用請依各投信官網自行更新。你的設定會存在這台瀏覽器（localStorage），下次打開還在。</span>
        </div>
      </div>

      {addOpen && <AddInstrumentPrompt onConfirm={addInstrument} onClose={() => setAddOpen(false)} />}
      {planOpen && <PlanWizard instruments={instruments} mode={mode} budget={budget} years={years} planExtras={planExtras} onApply={applyPlan} onClose={() => setPlanOpen(false)} />}
    </div>
  );
}

/* ---------- 錯誤邊界：render 出錯時顯示訊息，避免整頁空白 ---------- */
class ErrorBoundary extends React.Component {
  constructor(p) { super(p); this.state = { err: null }; }
  static getDerivedStateFromError(err) { return { err }; }
  render() {
    if (this.state.err) {
      return (
        <div style={{ fontFamily: "var(--sans)", color: "#11151C", padding: 24, maxWidth: 640, margin: "40px auto" }}>
          <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 8 }}>發生未預期的錯誤</div>
          <div style={{ fontSize: 13, color: "#6B7480", marginBottom: 12 }}>試算畫面無法繼續顯示。你的設定仍保存在瀏覽器中，可重新整理再試。</div>
          <pre style={{ fontSize: 12, background: "#F2F4F8", padding: 12, borderRadius: 8, overflow: "auto" }}>{String(this.state.err && this.state.err.message || this.state.err)}</pre>
        </div>
      );
    }
    return this.props.children;
  }
}

/* ---------- 啟動：先確認 CDN 相依都載入，失敗就給可讀訊息（取代永久「載入中…」） ---------- */
(function boot() {
  const root = document.getElementById("root");
  clearTimeout(window.__bootWatchdog); // 已進到啟動流程，停掉逾時看門狗
  const missing = [];
  if (typeof React === "undefined" || typeof ReactDOM === "undefined") missing.push("React");
  if (typeof Recharts === "undefined") missing.push("Recharts（圖表）");
  if (missing.length) {
    root.innerHTML = '<div class="boot" style="flex-direction:column;gap:8px;text-align:center;padding:24px">'
      + '<div style="font-size:16px;font-weight:700;color:#11151C">無法載入必要元件：' + missing.join("、") + '</div>'
      + '<div>請確認網路連線後重新整理。本工具首次開啟需連網下載 React 與圖表元件。</div></div>';
    return;
  }
  try {
    ReactDOM.createRoot(root).render(<ErrorBoundary><App /></ErrorBoundary>);
  } catch (e) {
    root.innerHTML = '<div class="boot">啟動失敗：' + String(e && e.message || e) + '</div>';
  }
})();
</script>
</body>
</html>
